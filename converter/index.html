<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#2a2a2a;color:white;font:normal 16pt/1.1 'EB Garamond',serif;margin:0 auto;padding:20px;max-width:700px}
h1{font-size:28pt;font-weight:400;text-align:center;margin:0 0 8pt;line-height:1}
h2{font-size:20pt;font-weight:400;text-align:center;margin:0 0 16pt;line-height:1}
button{background:#fff;color:#2a2a2a;border:none;font:16pt 'EB Garamond',serif;cursor:pointer;padding:4px 14px;white-space:nowrap}
button:hover{background:#ccc}
button:disabled{background:#555;color:#888;cursor:default}
#upload-btn,#convert-btn{display:block;margin:0 auto 8pt;min-width:180px;max-width:250px}
#file-info{text-align:center;font-size:14pt;color:white;margin:0 0 8pt}
select:invalid{color:#666}
#input-select,#output-select{color:#666}

#detected{text-align:center;font-size:16pt;color:white;margin:0 0 8pt}
select{width:100%;background:transparent;border:1px solid #fff;color:#fff;font:16pt 'EB Garamond',serif;padding:6px 10px;appearance:auto;margin:0 0 4pt}
select option{background:#2a2a2a;color:#fff;font-family:'EB Garamond',serif}
select:focus{outline:none}
#input-select{margin:0 0 4pt}
#output-select{margin:0 0 8pt}
#status{text-align:center;font-size:16pt;color:white;margin:0 0 8pt}
#preview{width:100%;max-height:200px;overflow-y:auto;background:transparent;border:1px solid #555;color:#fff;font:14pt 'EB Garamond',serif;padding:10px;margin:0 0 8pt;display:none}
#preview img{max-width:100%;max-height:180px;display:block;margin:0 auto}
#file-input{display:none}
@media(max-width:600px){.sub-break{display:block;font-size:0;line-height:0}}
</style>
</head>
<body>
<img src="/images/ConverterLogo.PNG" alt="Converter" style="width:100px;height:100px;display:block;margin:0 auto 8pt;border-radius:50%">
<h1>Erik's Transmogrifier</h1>
<h2><em>Knead With Your Hands</em>:<span class="sub-break"> </span>A File Conversion Tool</h2>

<button id="upload-btn" onclick="document.getElementById('file-input').click()">Upload File</button>
<input type="file" id="file-input">

<div id="file-info">No file selected</div>

<select id="input-select" onchange="onInputFormatChange()">
<option value="" disabled selected style="color:#666">Select input format</option>
</select>

<select id="output-select" onchange="onOutputFormatChange()">
<option value="" disabled selected style="color:#666">Select output format</option>
</select>

<button id="convert-btn" onclick="convert()" disabled>Convert</button>

<div id="status">Status: Ready</div>
<div id="preview"></div>

<script>
var inputFile=null, inputExt='', inputType='';

var allFormats = [
  {ext:'csv',type:'Data',desc:'Comma-Separated'},
  {ext:'doc',type:'Text',desc:'Word 97\u20132003'},
  {ext:'docx',type:'Text',desc:'Word'},
  {ext:'epub',type:'Text',desc:'E-Book'},
  {ext:'gif',type:'Image',desc:'Animated'},
  {ext:'heic',type:'Image',desc:'iPhone Photo'},
  {ext:'heif',type:'Image',desc:'Alt iPhone'},
  {ext:'jpg',type:'Image',desc:'Lossy Image'},
  {ext:'json',type:'Data',desc:'JSON Data'},
  {ext:'md',type:'Data',desc:'Markdown'},
  {ext:'pdf',type:'Text',desc:'Document'},
  {ext:'png',type:'Image',desc:'Lossless Image'},
  {ext:'svg',type:'Image',desc:'Vector'},
  {ext:'tsv',type:'Data',desc:'Tab-Separated'},
  {ext:'txt',type:'Data/Text',desc:'Plain Text'},
  {ext:'webp',type:'Image',desc:'Web Image'},
  {ext:'xls',type:'Data',desc:'Excel 97\u20132003'},
  {ext:'xlsx',type:'Data',desc:'Excel'},
  {ext:'xml',type:'Data',desc:'Markup'}
];

var outputMap = {
  Text: ['txt','pdf','docx','jpg'],
  Image: ['jpg','png','gif'],
  Data: ['csv','json','xlsx','xml','tsv','md'],
  'Data/Text': ['txt','pdf','docx','jpg','csv','json','xlsx','xml','tsv','md']
};

function getType(ext){
  ext=ext.toLowerCase(); if(ext==='jpeg')ext='jpg';
  var f=allFormats.find(function(x){return x.ext===ext;});
  return f?f.type:null;
}

function fmtSize(bytes){
  var mb=bytes/1048576;
  if(mb<0.05) return '0.1MB';
  if(mb<0.5) return mb.toFixed(1)+'MB';
  return Math.round(mb)+'MB';
}

var allOutputs=['csv','docx','gif','jpg','json','md','pdf','png','tsv','txt','xlsx','xml'];

function populateInputDropdown(filterType){
  var sel=document.getElementById('input-select');
  var cur=sel.value;
  sel.innerHTML='<option value="" disabled selected style="color:#666">Select input format</option>';
  var formats=filterType?allFormats.filter(function(f){return f.type===filterType||f.type==='Data/Text';}):allFormats;
  formats.forEach(function(f){
    var o=document.createElement('option');
    o.value=f.ext;
    o.textContent='.'+f.ext+' ('+f.desc+', '+f.type+')';
    if(f.ext===cur) o.selected=true;
    sel.appendChild(o);
  });
}

function populateOutputDropdown(filterType, excludeExt){
  var sel=document.getElementById('output-select');
  var cur=sel.value;
  sel.innerHTML='<option value="" disabled selected style="color:#666">Select output format</option>';
  var outputs=filterType?(outputMap[filterType]||[]):allOutputs;
  outputs.filter(function(o){return o!==excludeExt;}).forEach(function(o){
    var opt=document.createElement('option');
    opt.value=o;
    var oType=getType(o)||'';
    var oFmt=allFormats.find(function(x){return x.ext===o;});
    opt.textContent='.'+o+' ('+(oFmt?oFmt.desc+', ':'')+oType+')';
    if(o===cur) opt.selected=true;
    sel.appendChild(opt);
  });
}

function onInputFormatChange(){
  var ext=document.getElementById('input-select').value;
  document.getElementById('input-select').style.color=ext?'#fff':'#666';
  var type=ext?getType(ext):null;
  populateOutputDropdown(type, ext);
  document.getElementById('convert-btn').disabled=!document.getElementById('output-select').value;
}

function onOutputFormatChange(){
  var outExt=document.getElementById('output-select').value;
  document.getElementById('output-select').style.color=outExt?'#fff':'#666';
  var inExt=document.getElementById('input-select').value;
  if(!inExt && outExt){
    var outType=getType(outExt);
    if(outType) populateInputDropdown(outType);
  }
  document.getElementById('convert-btn').disabled=!(inExt && outExt);
}

// Initial population — all options in both
populateInputDropdown(null);
populateOutputDropdown(null, null);

document.getElementById('file-input').onchange = async function(){
  inputFile = this.files[0];
  if(!inputFile) return;
  inputExt = inputFile.name.split('.').pop().toLowerCase();
  if(inputExt==='jpeg') inputExt='jpg';
  inputType = getType(inputExt);

  document.getElementById('file-info').textContent = inputFile.name+', '+fmtSize(inputFile.size);
  document.getElementById('upload-btn').textContent = 'Replace File';

  document.getElementById('input-select').value=inputExt;
  document.getElementById('input-select').style.color='#fff';
  if(inputType) populateOutputDropdown(inputType, inputExt);
  else populateOutputDropdown(null, inputExt);
  document.getElementById('status').textContent = 'Status: Ready';
  document.getElementById('preview').style.display = 'none';
};

async function convert(){
  var selExt = document.getElementById('input-select').value || inputExt;
  var type = getType(selExt);
  if(!inputFile||!type) return;
  var outFmt = document.getElementById('output-select').value;
  if(!outFmt) return;
  document.getElementById('status').textContent = 'Status: Converting...';
  document.getElementById('convert-btn').disabled = true;

  try {
    var result = null;
    var textTypes=['Text','Data/Text'];
    var imgTypes=['Image'];
    var dataTypes=['Data'];

    if(textTypes.indexOf(type)>=0 && ['txt','pdf','docx','jpg'].indexOf(outFmt)>=0){
      result = await convertText(inputFile, selExt, outFmt);
    } else if(imgTypes.indexOf(type)>=0){
      result = await convertImage(inputFile, selExt, outFmt);
    } else if(dataTypes.indexOf(type)>=0 || (type==='Data/Text' && ['csv','json','xlsx','xml','tsv','md'].indexOf(outFmt)>=0)){
      result = await convertData(inputFile, selExt, outFmt);
    }

    if(result){
      var name = inputFile.name.replace(/\.[^.]+$/,'')+'.'+outFmt;
      var a = document.createElement('a');
      a.href = URL.createObjectURL(result.blob);
      a.download = name;
      a.click();
      // Free the blob URL after the download click — without this every
      // conversion leaks one blob's worth of memory.
      setTimeout(function(){ URL.revokeObjectURL(a.href); }, 100);
      var mb = result.blob.size/1048576;
      var mbStr = mb<0.05?'0.1MB':mb<0.5?mb.toFixed(1)+'MB':Math.round(mb)+'MB';
      document.getElementById('status').textContent = 'Status: Done, '+mbStr;
    }
  } catch(e){
    document.getElementById('status').textContent = 'Status: Error — '+e.message;
  }
  document.getElementById('convert-btn').disabled = false;
}

// === TEXT CONVERSIONS ===
async function convertText(file, fromExt, toExt){
  var text = '';

  if(fromExt==='txt'){
    text = await file.text();
  } else if(fromExt==='docx'||fromExt==='doc'){
    var buf = await file.arrayBuffer();
    var result = await mammoth.extractRawText({arrayBuffer:buf});
    text = result.value;
  } else if(fromExt==='pdf'){
    var pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.269/pdf.min.mjs');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.269/pdf.worker.min.mjs';
    var buf = await file.arrayBuffer();
    var pdf = await pdfjsLib.getDocument({data:buf}).promise;
    var pages = [];
    for(var i=1;i<=pdf.numPages;i++){
      var page = await pdf.getPage(i);
      var content = await page.getTextContent();
      pages.push(content.items.map(function(it){return it.str;}).join(' '));
    }
    text = pages.join('\n');
  } else if(fromExt==='epub'){
    var buf = await file.arrayBuffer();
    var zip = await JSZip.loadAsync(buf);
    var dp = new DOMParser();
    var containerStr = await zip.file('META-INF/container.xml').async('string');
    var cDoc = dp.parseFromString(containerStr, 'text/xml');
    var rootfiles = cDoc.getElementsByTagName('rootfile');
    if(!rootfiles.length) throw new Error('No rootfile in container.xml');
    var opfPath = rootfiles[0].getAttribute('full-path');
    var opfDir = opfPath.substring(0, opfPath.lastIndexOf('/') + 1);
    var opfStr = await zip.file(opfPath).async('string');
    var opfDoc = dp.parseFromString(opfStr, 'text/xml');
    var manifest = {};
    var items = opfDoc.getElementsByTagName('item');
    for(var mi = 0; mi < items.length; mi++){
      manifest[items[mi].getAttribute('id')] = items[mi].getAttribute('href');
    }
    var spineRefs = opfDoc.getElementsByTagName('itemref');
    var allText = [];
    for(var si = 0; si < spineRefs.length; si++){
      var href = manifest[spineRefs[si].getAttribute('idref')];
      if(!href) continue;
      var entry = zip.file(opfDir + href) || zip.file(href);
      if(!entry) continue;
      var xhtml = await entry.async('string');
      var xDoc = dp.parseFromString(xhtml, 'text/html');
      var body = xDoc.querySelector('body');
      if(body){
        var t = body.textContent.trim();
        if(t.length > 0) allText.push(t);
      }
    }
    text = allText.join('\n\n');
  }

  if(toExt==='jpg'&&fromExt==='pdf'){
    var pdfjsLib2 = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.269/pdf.min.mjs');
    pdfjsLib2.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.269/pdf.worker.min.mjs';
    var buf2 = await file.arrayBuffer();
    var pdf2 = await pdfjsLib2.getDocument({data:buf2}).promise;
    var page2 = await pdf2.getPage(1);
    var vp = page2.getViewport({scale:2});
    var canvas = document.createElement('canvas');
    canvas.width=vp.width; canvas.height=vp.height;
    await page2.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    return new Promise(function(resolve){
      canvas.toBlob(function(b){resolve({blob:b});},'image/jpeg',0.92);
    });
  }

  if(toExt==='txt'){
    return {blob: new Blob([text],{type:'text/plain'})};
  } else if(toExt==='pdf'){
    var jsPDF = window.jspdf.jsPDF;
    var doc = new jsPDF();
    var lines = doc.splitTextToSize(text, 180);
    var y = 20;
    for(var i=0;i<lines.length;i++){
      if(y>270){doc.addPage();y=20;}
      doc.text(lines[i],15,y);
      y+=7;
    }
    return {blob: doc.output('blob')};
  } else if(toExt==='docx'){
    var docxLib = window.docx;
    var paragraphs = text.split('\n').map(function(line){
      return new docxLib.Paragraph({children:[new docxLib.TextRun(line)]});
    });
    var doc = new docxLib.Document({sections:[{children:paragraphs}]});
    var buf = await docxLib.Packer.toBlob(doc);
    return {blob: buf};
  }
}

// === IMAGE CONVERSIONS ===
async function convertImage(file, fromExt, toExt){
  var imgFile = file;
  if(fromExt==='heic'||fromExt==='heif'){
    if(typeof heic2any==='undefined') throw new Error('HEIC decoder not loaded');
    var converted = await heic2any({blob:file, toType:'image/jpeg', quality:0.92});
    imgFile = converted;
  }
  return new Promise(function(resolve, reject){
    var img = new Image();
    var srcUrl = URL.createObjectURL(imgFile);
    function cleanup(){ try { URL.revokeObjectURL(srcUrl); } catch(e){} }
    img.onload = function(){
      var canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      var mimeMap = {jpg:'image/jpeg',png:'image/png',gif:'image/gif'};
      var mime = mimeMap[toExt] || 'image/png';
      var quality = toExt==='jpg' ? 0.92 : undefined;

      canvas.toBlob(function(blob){
        cleanup();
        if(blob) resolve({blob:blob});
        else reject(new Error('Conversion failed'));
      }, mime, quality);
    };
    img.onerror = function(){ cleanup(); reject(new Error('Could not load image')); };
    img.src = srcUrl;
  });
}

// === DATA CONVERSIONS ===
async function convertData(file, fromExt, toExt){
  var data = null; // array of arrays (rows)
  var headers = null;

  // Parse input
  if(fromExt==='csv'||fromExt==='tsv'||fromExt==='txt'){
    var text = await file.text();
    var delim = fromExt==='tsv'||fromExt==='txt' ? '\t' : ',';
    var lines = text.trim().split('\n');
    data = lines.map(function(l){return l.split(delim);});
    if(data.length>0) headers = data[0];
  } else if(fromExt==='json'){
    var text = await file.text();
    var parsed = JSON.parse(text);
    if(Array.isArray(parsed)&&parsed.length>0&&typeof parsed[0]==='object'){
      headers = Object.keys(parsed[0]);
      data = [headers].concat(parsed.map(function(row){return headers.map(function(h){return row[h]||'';});}));
    } else {
      data = [['key','value']];
      for(var k in parsed) data.push([k, JSON.stringify(parsed[k])]);
      headers = data[0];
    }
  } else if(fromExt==='xlsx'||fromExt==='xls'){
    var buf = await file.arrayBuffer();
    var wb = XLSX.read(buf);
    var ws = wb.Sheets[wb.SheetNames[0]];
    data = XLSX.utils.sheet_to_json(ws, {header:1});
    if(data.length>0) headers = data[0];
  } else if(fromExt==='xml'){
    var text = await file.text();
    var parser = new DOMParser();
    var xml = parser.parseFromString(text,'text/xml');
    var rows = xml.querySelectorAll('*');
    data = [['tag','text']];
    rows.forEach(function(r){if(r.children.length===0&&r.textContent.trim()) data.push([r.tagName,r.textContent.trim()]);});
    headers = data[0];
  } else if(fromExt==='md'){
    var text = await file.text();
    data = [['content']];
    text.split('\n').forEach(function(l){data.push([l]);});
    headers = data[0];
  }

  if(!data||data.length===0) throw new Error('No data found in file');

  // Convert output
  if(toExt==='csv'){
    var csv = data.map(function(row){return row.map(function(c){
      var s=String(c||''); return s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0 ? '"'+s.replace(/"/g,'""')+'"' : s;
    }).join(',');}).join('\n');
    return {blob: new Blob([csv],{type:'text/csv'})};
  } else if(toExt==='tsv'){
    var tsv = data.map(function(row){return row.map(function(c){return String(c||'');}).join('\t');}).join('\n');
    return {blob: new Blob([tsv],{type:'text/tab-separated-values'})};
  } else if(toExt==='json'){
    if(headers){
      var jsonArr = [];
      for(var i=1;i<data.length;i++){
        var obj={};
        for(var j=0;j<headers.length;j++) obj[headers[j]]=data[i][j]||'';
        jsonArr.push(obj);
      }
      return {blob: new Blob([JSON.stringify(jsonArr,null,2)],{type:'application/json'})};
    }
    return {blob: new Blob([JSON.stringify(data,null,2)],{type:'application/json'})};
  } else if(toExt==='xlsx'){
    var ws = XLSX.utils.aoa_to_sheet(data);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
    var buf = XLSX.write(wb, {type:'array',bookType:'xlsx'});
    return {blob: new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})};
  } else if(toExt==='xml'){
    var xml = '<?xml version="1.0" encoding="UTF-8"?>\n<data>\n';
    for(var i=1;i<data.length;i++){
      xml += '  <row>\n';
      for(var j=0;j<(headers||data[0]).length;j++){
        var tag = (headers||data[0])[j].replace(/[^a-zA-Z0-9]/g,'_');
        xml += '    <'+tag+'>'+(data[i][j]||'')+'</'+tag+'>\n';
      }
      xml += '  </row>\n';
    }
    xml += '</data>';
    return {blob: new Blob([xml],{type:'application/xml'})};
  } else if(toExt==='md'){
    if(!headers||data.length<2) return {blob: new Blob([data.map(function(r){return r.join(' | ');}).join('\n')],{type:'text/markdown'})};
    var md = '| '+headers.join(' | ')+' |\n';
    md += '| '+headers.map(function(){return '---';}).join(' | ')+' |\n';
    for(var i=1;i<data.length;i++){
      md += '| '+data[i].map(function(c){return String(c||'');}).join(' | ')+' |\n';
    }
    return {blob: new Blob([md],{type:'text/markdown'})};
  }
}

document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  if(e.ctrlKey&&e.key==='Enter'){e.preventDefault();convert();}
});
</script>
