<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="/images/Favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/images/Favicon-192.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2a2a2a">
<title>Erik's Linguifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#2a2a2a;color:white;font:normal 16pt/1.1 'EB Garamond',serif;margin:0 auto;padding:20px;max-width:700px}
h1{font-size:28pt;font-weight:400;text-align:center;margin:0 0 8pt;line-height:1}
h2{font-size:20pt;font-weight:400;text-align:center;margin:0 0 16pt;line-height:1}
h3{font-size:18pt;font-weight:500;margin:8pt 0 8pt;text-align:center;border-bottom:1px solid #555;padding-bottom:4px}
a,a:visited{color:#fff;text-decoration:underline;cursor:pointer}
a:hover{color:#ccc}
button{background:#fff;color:#2a2a2a;border:none;font:14pt 'EB Garamond',serif;cursor:pointer;padding:6px 14px;white-space:nowrap;border-radius:4px}
button:hover:not(:disabled){background:#ccc}
button:disabled{background:#555;color:#888;cursor:default}
select{width:100%;background:transparent;border:1px solid #fff;color:#fff;font:14pt 'EB Garamond',serif;padding:6px 10px;appearance:auto;margin:0}
select option{background:#2a2a2a;color:#fff;font-family:'EB Garamond',serif}
textarea,input[type=text]{width:100%;background:rgba(255,255,255,0.04);border:1px solid #555;border-radius:6px;color:#fff;font:14pt 'EB Garamond',serif;padding:10px;resize:vertical}
textarea{min-height:140px}
textarea:focus,input[type=text]:focus{outline:none;border-color:#888}

.lang-row{display:flex;gap:8px;align-items:center;margin:0 0 10pt}
.lang-row select{flex:1;min-width:0}
.lang-row .swap-btn{flex:0 0 auto;width:42px;height:42px;padding:0;font-size:16pt}

.text-pair{display:grid;grid-template-columns:1fr;gap:12pt;margin:0 0 8pt}
@media(min-width:680px){.text-pair{grid-template-columns:1fr 1fr}}
.text-block{display:flex;flex-direction:column;gap:6px}
.text-block textarea{flex:1}
.text-actions{display:flex;gap:6px;justify-content:flex-end}
.text-actions button{padding:4px 10px;font-size:11pt}

#translate-controls{display:flex;gap:10px;align-items:center;justify-content:center;margin:0 0 16pt;flex-wrap:wrap;font-size:13pt;color:#bbb}
#translate-status{font-size:12pt;color:#aaa;min-height:1em}

.pron-row{display:flex;gap:8px;margin:0 0 8pt}
.pron-row input{flex:1}
#pron-output{background:rgba(255,255,255,0.04);border:1px solid #555;border-radius:6px;padding:14px;min-height:54px;font-size:20pt;text-align:center;letter-spacing:0.5px;display:flex;align-items:center;justify-content:center;margin:0 0 8pt}
#pron-output.placeholder{color:#666;font-style:italic;font-size:14pt;letter-spacing:0}
#pron-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:0 0 8pt}

@media(max-width:600px){.sub-break{display:block;font-size:0;line-height:0}}
</style>
</head>
<body>
<img src="/images/Favicon.png" alt="EM" style="width:100px;height:100px;display:block;margin:0 auto 8pt;border-radius:50%">
<h1>Erik's Linguifier</h1>
<h2><em>Speak With Your Tongue</em>:<span class="sub-break"> </span>A Linguistic Tool</h2>

<h3>The Translatorator</h3>
<div class="lang-row">
  <select id="src-lang" onchange="onLangChange()"></select>
  <button class="swap-btn" onclick="swapLanguages()" title="Swap">⇄</button>
  <select id="tgt-lang" onchange="onLangChange()"></select>
</div>

<div class="text-pair">
  <div class="text-block">
    <textarea id="src-text" placeholder="Enter text" oninput="onSrcInput()"></textarea>
    <div class="text-actions">
      <button onclick="speakSrc()">Speak</button>
      <button onclick="clearSrc()">Clear</button>
    </div>
  </div>
  <div class="text-block">
    <textarea id="tgt-text" placeholder="Translation" readonly></textarea>
    <div class="text-actions">
      <button onclick="speakTgt()">Speak</button>
      <button onclick="copyTgt()">Copy</button>
    </div>
  </div>
</div>

<div id="translate-controls">
  <button id="translate-btn" onclick="doTranslate()">Translate</button>
  <label><input type="checkbox" id="auto-translate" checked> Auto-translate</label>
  <span id="translate-status"></span>
</div>

<h3>The Pronouncerator</h3>
<div class="pron-row">
  <input type="text" id="pron-input" placeholder="Type a word" onkeydown="if(event.key==='Enter'){event.preventDefault();doPronounce();}">
  <button onclick="doPronounce()">Pronounce</button>
</div>
<div id="pron-output" class="placeholder">—</div>
<div id="pron-actions">
  <button id="pron-speak-btn" onclick="speakPronWord()" disabled>Speak</button>
  <button id="pron-copy-btn" onclick="copyPron()" disabled>Copy</button>
</div>

<div style="text-align:center;margin:16pt 0 0"><a href="/" style="color:#fff">Home</a> | <a href="/tech/" style="color:#fff">Tech</a> | <a href="/app/" style="color:#fff">App</a> | <a href="/suite/" style="color:#fff">Suite</a> | <a href="/audiobooker/" style="color:#fff">Audiobooker</a> | <a href="/converter/" style="color:#fff">Converter</a> | <a href="/dictator/" style="color:#fff">Dictator</a> | <a href="/musicker/" style="color:#fff">Musicker</a> | <a href="/narrator/" style="color:#fff">Narrator</a> | <a href="/reader/" style="color:#fff">Reader</a> | <a href="/scanner/" style="color:#fff">Scanner</a> | <a href="/translator/" style="color:#fff">Translator</a> | <a href="/typesetter/" style="color:#fff">Typesetter</a></div>
<br>
<img src="/images/Logophile.png" alt="EM" style="width:100px;height:100px;display:block;margin:0 auto 8pt;border-radius:50%">

<script>
const LANGUAGES = [
  {code:'ar',name:'Arabic'},{code:'bn',name:'Bengali'},
  {code:'zh-CN',name:'Chinese (Simplified)'},{code:'zh-TW',name:'Chinese (Traditional)'},
  {code:'nl',name:'Dutch'},{code:'en',name:'English'},
  {code:'fr',name:'French'},{code:'de',name:'German'},
  {code:'el',name:'Greek'},{code:'hi',name:'Hindi'},
  {code:'it',name:'Italian'},{code:'ja',name:'Japanese'},
  {code:'ko',name:'Korean'},{code:'pl',name:'Polish'},
  {code:'pt',name:'Portuguese'},{code:'ru',name:'Russian'},
  {code:'es',name:'Spanish'},{code:'sv',name:'Swedish'},
  {code:'tr',name:'Turkish'},{code:'vi',name:'Vietnamese'}
];

function populateLanguageSelects(){
  const src = document.getElementById('src-lang');
  const tgt = document.getElementById('tgt-lang');
  src.innerHTML = '<option value="auto">Detect Language</option>' +
    LANGUAGES.map(l => `<option value="${l.code}">${l.name}</option>`).join('');
  tgt.innerHTML = LANGUAGES.map(l => `<option value="${l.code}">${l.name}</option>`).join('');
  src.value = 'auto'; tgt.value = 'es';
  try {
    const saved = JSON.parse(localStorage.getItem('tlt_langs') || 'null');
    if (saved) { if (saved.src) src.value = saved.src; if (saved.tgt) tgt.value = saved.tgt; }
  } catch(e){}
}

function onLangChange(){
  try {
    localStorage.setItem('tlt_langs', JSON.stringify({
      src: document.getElementById('src-lang').value,
      tgt: document.getElementById('tgt-lang').value
    }));
  } catch(e){}
  if (document.getElementById('src-text').value.trim()) doTranslate();
}

function swapLanguages(){
  const src = document.getElementById('src-lang');
  const tgt = document.getElementById('tgt-lang');
  const srcText = document.getElementById('src-text');
  const tgtText = document.getElementById('tgt-text');
  const newSrc = tgt.value;
  const newTgt = src.value === 'auto' ? 'en' : src.value;
  src.value = newSrc; tgt.value = newTgt;
  const t = srcText.value; srcText.value = tgtText.value; tgtText.value = t;
  onLangChange();
}

let _ctrl = null;
let _debounce = null;

async function doTranslate(){
  if (_ctrl) _ctrl.abort();
  const ctrl = new AbortController();
  _ctrl = ctrl;
  const text = document.getElementById('src-text').value.trim();
  const tgt = document.getElementById('tgt-text');
  const status = document.getElementById('translate-status');
  if (!text) { tgt.value = ''; status.textContent = ''; return; }
  let src = document.getElementById('src-lang').value;
  const target = document.getElementById('tgt-lang').value;
  if (src === target) { tgt.value = text; status.textContent = ''; return; }
  status.textContent = 'Translating';
  const myMemSrc = (src === 'auto') ? 'Autodetect' : src;
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${encodeURIComponent(myMemSrc + '|' + target)}`;
  try {
    const res = await fetch(url, {signal: ctrl.signal});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.responseStatus !== 200 && data.responseStatus !== '200') throw new Error(data.responseDetails || 'failed');
    tgt.value = (data.responseData && data.responseData.translatedText) || '';
    status.textContent = '';
  } catch (e) {
    if (e.name === 'AbortError') return;
    try {
      const lingvaSrc = (src === 'auto') ? 'auto' : src;
      const lurl = `https://lingva.ml/api/v1/${encodeURIComponent(lingvaSrc)}/${encodeURIComponent(target)}/${encodeURIComponent(text)}`;
      const r2 = await fetch(lurl, {signal: ctrl.signal});
      if (!r2.ok) throw new Error('HTTP ' + r2.status);
      const d2 = await r2.json();
      tgt.value = d2.translation || '';
      status.textContent = '';
    } catch (e2) {
      if (e2.name === 'AbortError') return;
      status.textContent = 'Translation failed';
    }
  }
}

function onSrcInput(){
  if (!document.getElementById('auto-translate').checked) return;
  if (_debounce) clearTimeout(_debounce);
  _debounce = setTimeout(doTranslate, 600);
}

function clearSrc(){
  document.getElementById('src-text').value = '';
  document.getElementById('tgt-text').value = '';
  document.getElementById('translate-status').textContent = '';
}

async function copyTgt(){
  const text = document.getElementById('tgt-text').value;
  if (!text) return;
  try { await navigator.clipboard.writeText(text); } catch(e){}
}

let _voicesLoaded = false;
function ensureVoices(){
  return new Promise(resolve => {
    if (_voicesLoaded || speechSynthesis.getVoices().length > 0) { _voicesLoaded = true; resolve(); return; }
    speechSynthesis.addEventListener('voiceschanged', function once(){
      _voicesLoaded = true;
      speechSynthesis.removeEventListener('voiceschanged', once);
      resolve();
    });
    setTimeout(resolve, 500);
  });
}

async function speak(text, lang){
  if (!text || !('speechSynthesis' in window)) return;
  await ensureVoices();
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  const voices = speechSynthesis.getVoices();
  const match = voices.find(v => v.lang === lang)
             || voices.find(v => v.lang && v.lang.toLowerCase().startsWith(lang.toLowerCase().slice(0,2)));
  if (match) u.voice = match;
  u.rate = 1.0;
  speechSynthesis.speak(u);
}

function speakSrc(){
  let lang = document.getElementById('src-lang').value;
  if (lang === 'auto') lang = 'en';
  speak(document.getElementById('src-text').value, lang);
}
function speakTgt(){
  speak(document.getElementById('tgt-text').value, document.getElementById('tgt-lang').value);
}

const ARP_MAP = {
  'AA':'ah','AE':'a','AH':'uh','AO':'aw','AW':'ow',
  'AY':'i','EH':'e','ER':'er','EY':'ay','IH':'i',
  'IY':'ee','OW':'oh','OY':'oy','UH':'uu','UW':'oo',
  'B':'b','CH':'ch','D':'d','DH':'th','F':'f',
  'G':'g','HH':'h','JH':'j','K':'k','L':'l',
  'M':'m','N':'n','NG':'ng','P':'p','R':'r',
  'S':'s','SH':'sh','T':'t','TH':'th','V':'v',
  'W':'w','Y':'y','Z':'z','ZH':'zh'
};
const VOWELS = new Set(['AA','AE','AH','AO','AW','AY','EH','ER','EY','IH','IY','OW','OY','UH','UW']);

function arpabetToCustom(arpabet){
  if (!arpabet) return '';
  const phonemes = arpabet.trim().split(/\s+/);
  const segs = phonemes.map(p => {
    const m = p.match(/^([A-Z]+)([012])?$/);
    if (!m) return null;
    return {phon: m[1], stress: m[2] || null, isVowel: VOWELS.has(m[1])};
  }).filter(Boolean);
  const syllables = [];
  let pendingOnset = [];
  let i = 0;
  while (i < segs.length) {
    if (segs[i].isVowel) {
      let nextV = -1;
      for (let j = i + 1; j < segs.length; j++) if (segs[j].isVowel) { nextV = j; break; }
      const between = (nextV > 0) ? segs.slice(i + 1, nextV) : segs.slice(i + 1);
      let coda = [], nextOnset = [];
      if (nextV > 0) nextOnset = between; else coda = between;
      syllables.push({onset: pendingOnset.map(s => s.phon), vowel: segs[i].phon, stress: segs[i].stress, coda: coda.map(s => s.phon)});
      pendingOnset = nextOnset.slice();
      i = (nextV > 0) ? nextV : segs.length;
    } else {
      pendingOnset.push(segs[i]);
      i++;
    }
  }
  if (syllables.length === 0) return phonemes.map(p => (ARP_MAP[p.replace(/[012]$/,'')] || p.toLowerCase())).join('');
  return syllables.map(syl => {
    const onset = syl.onset.map(c => ARP_MAP[c] || '').join('');
    const vowel = ARP_MAP[syl.vowel] || '';
    const coda = syl.coda.map(c => ARP_MAP[c] || '').join('');
    const text = onset + vowel + coda;
    return (syl.stress === '1') ? text.toUpperCase() : text.toLowerCase();
  }).join('-');
}

async function doPronounce(){
  const word = document.getElementById('pron-input').value.trim().toLowerCase();
  const out = document.getElementById('pron-output');
  const speakBtn = document.getElementById('pron-speak-btn');
  const copyBtn = document.getElementById('pron-copy-btn');
  if (!word) { out.textContent = '—'; out.classList.add('placeholder'); speakBtn.disabled = true; copyBtn.disabled = true; return; }
  out.textContent = 'Looking up';
  out.classList.remove('placeholder');
  speakBtn.disabled = true; copyBtn.disabled = true;
  try {
    const url = `https://api.datamuse.com/words?sp=${encodeURIComponent(word)}&md=r&max=1`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data.length || !data[0].tags) { out.textContent = 'Not found'; out.classList.add('placeholder'); return; }
    const pronTag = data[0].tags.find(t => typeof t === 'string' && t.startsWith('pron:'));
    if (!pronTag) { out.textContent = 'No pronunciation'; out.classList.add('placeholder'); return; }
    out.textContent = arpabetToCustom(pronTag.substring(5)) || '(format error)';
    speakBtn.disabled = false; copyBtn.disabled = false;
  } catch (e) {
    out.textContent = 'Error';
    out.classList.add('placeholder');
  }
}

function speakPronWord(){
  speak(document.getElementById('pron-input').value.trim(), 'en-US');
}

async function copyPron(){
  const text = document.getElementById('pron-output').textContent;
  if (!text || text === '—') return;
  try { await navigator.clipboard.writeText(text); } catch(e){}
}

populateLanguageSelects();
ensureVoices();
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(e=>{});});}</script>
</body>
</html>
