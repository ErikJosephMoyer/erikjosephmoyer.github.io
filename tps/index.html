<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="/images/Favicon.png" type="image/png">
<title>Erik's Prettifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#2a2a2a;color:white;font:normal 16pt/1.1 'EB Garamond',serif;margin:0 auto;padding:20px;max-width:700px}
h1{font-size:28pt;font-weight:400;text-align:center;margin:0 0 8pt;line-height:1}
h2{font-size:20pt;font-weight:400;text-align:center;margin:0 0 16pt;line-height:1}
button{background:#fff;color:#2a2a2a;border:none;font:16pt 'EB Garamond',serif;cursor:pointer;padding:4px 14px;white-space:nowrap}
button:hover{background:#ccc}
button:disabled{background:#555;color:#888;cursor:default}
#upload-btn,#gen-btn{display:block;margin:0 auto 8pt;min-width:180px;max-width:250px}
#file-info{text-align:center;font-size:14pt;color:white;margin:0 0 8pt}
select{width:100%;background:transparent;border:1px solid #fff;color:#fff;font:16pt 'EB Garamond',serif;padding:6px 10px;appearance:auto;margin:0 0 8pt}
select option{background:#2a2a2a;color:#fff;font-family:'EB Garamond',serif}
#font-select option{font-family:inherit}
select:focus{outline:none}
#settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:4pt 16pt;margin:0 0 8pt}
@media(max-width:600px){#settings-grid{grid-template-columns:1fr}}
.setting{display:flex;align-items:center;gap:8px}
.setting-label{white-space:nowrap;min-width:auto;text-align:right;font-size:16pt}
.setting select{flex:1}
#status{text-align:center;font-size:16pt;color:white;margin:0 0 8pt}
#file-input{display:none}
@media(max-width:600px){.sub-break{display:block;font-size:0;line-height:0}}
</style>
</head>
<body>
<img src="/images/TypesetterLogo.PNG" alt="Typesetter" style="width:100px;height:100px;display:block;margin:0 auto 8pt;border-radius:50%">
<h1>Erik's Prettifier</h1>
<h2><em>Read With Your Eyes</em>:<span class="sub-break"> </span>A Typesetting Tool</h2>

<button id="upload-btn" onclick="document.getElementById('file-input').click()">Upload File</button>
<input type="file" id="file-input" accept=".txt,.doc,.docx,.pdf,.epub">
<div id="file-info">No file selected</div>

<textarea id="text-input" placeholder="Paste or type text here..." style="width:100%;height:150px;background:transparent;border:1px solid #fff;color:#fff;font:16pt 'EB Garamond',serif;padding:10px;resize:none;overflow-y:auto;display:block;margin:0 0 8pt"></textarea>

<h2>Settings</h2>
<div id="settings-grid">

<div class="setting"><span class="setting-label">Font:</span><select id="font-select">
<option value="Arial" style="font-family:Arial">Arial</option>
<option value="Arial Narrow" style="font-family:'Arial Narrow'">Arial Narrow</option>
<option value="Calibri" style="font-family:Calibri">Calibri</option>
<option value="EB Garamond" style="font-family:'EB Garamond'">EB Garamond</option>
<option value="Garamond" style="font-family:Garamond">Garamond</option>
<option value="Georgia" selected style="font-family:Georgia">Georgia</option>
<option value="Helvetica" style="font-family:Helvetica">Helvetica</option>
<option value="Roboto" style="font-family:Roboto">Roboto</option>
<option value="Times New Roman" style="font-family:'Times New Roman'">Times New Roman</option>
<option value="Verdana" style="font-family:Verdana">Verdana</option>
</select></div>

<div class="setting"><span class="setting-label">Font Size:</span><select id="size-select">
<option value="5">5</option>
<option value="10">10</option>
<option value="12">12</option>
<option value="15">15</option>
<option value="20">20</option>
<option value="25" selected>25</option>
<option value="30">30</option>
</select></div>

<div class="setting"><span class="setting-label">Alignment:</span><select id="align-select">
<option value="justify" selected>Justified</option>
<option value="left">Left-Aligned</option>
</select></div>

<div class="setting"><span class="setting-label">Margins:</span><select id="margin-select">
<option value="0">0"</option>
<option value="7.2" selected>0.1"</option>
<option value="18">0.25"</option>
<option value="36">0.5"</option>
<option value="72">1"</option>
</select></div>

<div class="setting"><span class="setting-label">Theme:</span><select id="color-select">
<option value="black" selected>Black Fill, White Text</option>
<option value="gray">Gray Fill, White Text</option>
<option value="white">White Fill, Black Text</option>
</select></div>

<div class="setting"><span class="setting-label">Front &amp; Back Matter:</span><select id="matter-select">
<option value="cut">Exclude</option>
<option value="keep" selected>Include</option>
</select></div>

</div>

<button id="gen-btn" onclick="generate()" disabled>Generate PDF</button>
<div id="status">Status: Ready</div>

<script>
var inputFile = null, rawText = '';

/* ───────── FILE UPLOAD ───────── */
document.getElementById('file-input').onchange = async function () {
  inputFile = this.files[0];
  if (!inputFile) return;
  var mb = inputFile.size / 1048576;
  var sz = mb < 0.05 ? '0.1 MB' : mb < 0.5 ? mb.toFixed(1) + ' MB' : Math.round(mb) + ' MB';
  document.getElementById('file-info').textContent = inputFile.name + ', ' + sz;
  document.getElementById('upload-btn').textContent = 'Replace File';
  document.getElementById('status').textContent = 'Status: Extracting text...';

  var ext = inputFile.name.split('.').pop().toLowerCase();
  try {
    if (ext === 'txt') {
      rawText = await inputFile.text();
    } else if (ext === 'docx' || ext === 'doc') {
      var buf = await inputFile.arrayBuffer();
      rawText = (await mammoth.extractRawText({ arrayBuffer: buf })).value;
    } else if (ext === 'pdf') {
      var pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.269/pdf.min.mjs');
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.269/pdf.worker.min.mjs';
      var pdf = await pdfjsLib.getDocument({ data: await inputFile.arrayBuffer() }).promise;
      var pages = [];
      for (var i = 1; i <= pdf.numPages; i++) {
        var pg = await pdf.getPage(i);
        var ct = await pg.getTextContent();
        pages.push(ct.items.map(function (it) { return it.str; }).join(' '));
      }
      rawText = pages.join('\n');
    } else if (ext === 'epub') {
      rawText = await extractEpub(inputFile);
    }
    document.getElementById('status').textContent = 'Status: Ready (' + rawText.split(/\s+/).length.toLocaleString() + ' words)';
    document.getElementById('gen-btn').disabled = false;
  } catch (e) {
    console.error(e);
    document.getElementById('status').textContent = 'Status: Error reading file - ' + e.message;
  }
};

/* ───────── EPUB EXTRACTION ───────── */
async function extractEpub(file) {
  var buf = await file.arrayBuffer();
  var zip = await JSZip.loadAsync(buf);
  var dp = new DOMParser();
  // Find OPF path from container.xml
  var containerStr = await zip.file('META-INF/container.xml').async('string');
  var containerDoc = dp.parseFromString(containerStr, 'text/xml');
  // Use getElementsByTagName to avoid namespace issues
  var rootfiles = containerDoc.getElementsByTagName('rootfile');
  if (!rootfiles.length) throw new Error('No rootfile in container.xml');
  var opfPath = rootfiles[0].getAttribute('full-path');
  var opfDir = opfPath.substring(0, opfPath.lastIndexOf('/') + 1);
  // Parse OPF for manifest + spine
  var opfStr = await zip.file(opfPath).async('string');
  var opfDoc = dp.parseFromString(opfStr, 'text/xml');
  var manifest = {};
  var items = opfDoc.getElementsByTagName('item');
  for (var i = 0; i < items.length; i++) {
    manifest[items[i].getAttribute('id')] = items[i].getAttribute('href');
  }
  var spineRefs = opfDoc.getElementsByTagName('itemref');
  var allText = [];
  for (var j = 0; j < spineRefs.length; j++) {
    var idref = spineRefs[j].getAttribute('idref');
    var href = manifest[idref];
    if (!href) continue;
    var entry = zip.file(opfDir + href) || zip.file(href);
    if (!entry) continue;
    var xhtml = await entry.async('string');
    var xDoc = dp.parseFromString(xhtml, 'text/html');
    var body = xDoc.querySelector('body');
    if (body) {
      var t = body.textContent.trim();
      if (t.length > 0) allText.push(t);
    }
  }
  if (allText.length === 0) throw new Error('No text content found in EPUB');
  return allText.join('\n\n');
}

/* ───────── TEXT INPUT ───────── */
document.getElementById('text-input').oninput = function () {
  if (this.value.trim().length > 0) {
    rawText = this.value;
    document.getElementById('gen-btn').disabled = false;
    document.getElementById('status').textContent = 'Status: Ready (' + rawText.split(/\s+/).length.toLocaleString() + ' words)';
  } else {
    if (!inputFile) {
      document.getElementById('gen-btn').disabled = true;
      document.getElementById('status').textContent = 'Status: Ready';
    }
  }
};

/* ───────── CURLY QUOTES ───────── */
function fixQuotes(t) {
  // Double quotes
  t = t.replace(/(^|[\s(\[{])"(?=\S)/gm, '$1\u201C');
  t = t.replace(/"/g, '\u201D');
  // Single quotes / apostrophes
  t = t.replace(/(^|[\s(\[{])'(?=\S)/gm, '$1\u2018');
  t = t.replace(/'/g, '\u2019');
  return t;
}

/* ───────── CLEAN TEXT ───────── */
function cleanText(t) {
  t = t.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  // Remove control chars except tab and newline
  t = t.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '');
  // Normalize whitespace chars
  t = t.replace(/\u00A0/g, ' ');
  // En-dash to em-dash
  t = t.replace(/\u2013/g, '\u2014');
  // Remove replacement character
  t = t.replace(/\ufffd/g, '');
  // Remove other common junk
  t = t.replace(/\uFEFF/g, '');
  // Fix curly quotes
  t = fixQuotes(t);
  return t;
}

/* ───────── METADATA DETECTION ───────── */
function detectMeta(text) {
  var title = '', author = '', year = '', translator = '';
  var header = text.substring(0, 8000);
  var lines = header.split('\n');

  for (var i = 0; i < lines.length; i++) {
    var l = lines[i].trim();
    // "Title (c) Year Author" pattern
    var cm = l.match(/^(.+?)\s*[©\u00A9]\s*(\d{4})\s+(.+)/);
    if (cm) {
      if (!title || cm[1].length > title.length) title = cm[1].replace(/[:]\s*$/, '').trim();
      year = cm[2];
      author = cm[3].trim();
    }
    // "First published in YYYY"
    var fpm = l.match(/first published.*?(\d{4})/i);
    if (fpm && !year) year = fpm[1];
    // "Translated by ..."
    var trm = l.match(/translated by\s+(.+)/i);
    if (trm) translator = trm[1].replace(/[.,;].*$/, '').trim();
    // "(c) YYYY by Author"
    var cm2 = l.match(/[©\u00A9]\s*(\d{4})\s+(?:by\s+)?(.+)/i);
    if (cm2 && !author) { year = cm2[1]; author = cm2[2].trim(); }
  }

  // Try first substantial line as title if we still don't have one
  if (!title) {
    for (var i = 0; i < Math.min(30, lines.length); i++) {
      var l = lines[i].trim();
      if (l.length > 3 && l.length < 200 && !/^(summary|bio|copyright|isbn|©|all rights|first published|printed|ebook|www\.|@)/i.test(l)) {
        title = l;
        break;
      }
    }
  }

  // Fallback: parse filename "Author - Title"
  if ((!title || !author) && inputFile) {
    var fn = inputFile.name.replace(/\.[^.]+$/, '');
    var parts = fn.split(' - ');
    if (parts.length >= 2) {
      if (!author) author = parts[0].trim();
      if (!title) title = parts.slice(1).join(' - ').trim();
    } else if (!title) {
      title = fn.substring(0, 30);
    }
  }

  // Clean author: remove "All rights reserved..." etc.
  author = author.replace(/\s*All rights.*/i, '').replace(/\s*No part.*/i, '').trim();

  return { title: title, author: author, year: year, translator: translator };
}

/* ───────── CHAPTER DETECTION ───────── */
function detectChapters(text) {
  var lines = text.split('\n');
  var chapters = [];
  var seen = {};

  // Patterns for chapter headings in the body text
  // We look for lines that are standalone short headings
  var chapterPatterns = [
    /^(Preface)$/i,
    /^(Acknowledgments?)$/i,
    /^(Introduction)$/i,
    /^(Epilogue)$/i,
    /^(Prologue)$/i,
    /^(Foreword)$/i,
    /^(Afterword)$/i,
    /^(Conclusion)$/i,
    // "Chapter N" or "Chapter N: Title" or "CHAPTER N"
    /^(Chapter\s+\d+[^\n]*)/i,
    /^(Chapter\s+[IVXLCDM]+[^\n]*)/i,
    // "Part N" or "Part N: Title"
    /^(Part\s+\d+[^\n]*)/i,
    /^(Part\s+[IVXLCDM]+[^\n]*)/i,
    // Numbered sections: "1 Introduction", "2.1 Sizing teams", "3.12.1 Positive..."
    /^(\d+\.\d+\.\d+\s+[A-Z][^\n]{2,80})$/,
    /^(\d+\.\d+\s+[A-Z][^\n]{2,80})$/,
    /^(\d+\s+[A-Z][^\n]{2,80})$/,
    // Standalone single number on a line (like "1", "2") - skip these
  ];

  // First pass: find the TOC section if it exists, to learn the real headings
  var tocHeadings = [];
  var inToc = false;
  var tocEnd = -1;
  for (var i = 0; i < Math.min(lines.length, 1000); i++) {
    var l = lines[i].trim();
    if (/^Contents$/i.test(l)) {
      inToc = true;
      continue;
    }
    if (inToc) {
      // TOC entries are lines with text in them
      if (l.length > 0) {
        // Stop TOC when we hit the actual body (long paragraph)
        if (l.length > 120) { tocEnd = i; break; }
        // Collect TOC heading
        tocHeadings.push(l);
      }
      // If we see something that looks like body text starting, end TOC
      if (l === '' && tocHeadings.length > 5) {
        // Count consecutive blank lines
        var blanks = 0;
        for (var j = i; j < Math.min(i + 10, lines.length); j++) {
          if (lines[j].trim() === '') blanks++;
          else break;
        }
        // If there's a section like "Landmarks", stop
        if (blanks >= 3) {
          // Check what comes next
          for (var j = i; j < Math.min(i + 20, lines.length); j++) {
            var nl = lines[j].trim();
            if (nl === 'Landmarks' || nl === 'Cover' || nl === 'Title Page' || nl === 'Start of Content') {
              tocEnd = j;
              break;
            }
          }
          if (tocEnd > 0) break;
        }
      }
    }
  }

  // Second pass: find headings in the actual body text
  // The body starts after front matter (after "Landmarks" / "Start of Content" section, or after the TOC)
  var bodyStart = 0;
  for (var i = 0; i < Math.min(lines.length, 1000); i++) {
    if (lines[i].trim() === 'Start of Content') {
      bodyStart = i + 1;
      break;
    }
  }
  // If no "Start of Content" marker, look for first real paragraph after TOC
  if (bodyStart === 0 && tocEnd > 0) {
    bodyStart = tocEnd;
  }

  // Build a set of known headings from TOC for fast lookup
  var tocSet = {};
  for (var i = 0; i < tocHeadings.length; i++) {
    tocSet[tocHeadings[i].trim()] = true;
  }

  // Scan body for chapter headings
  for (var i = bodyStart; i < lines.length; i++) {
    var l = lines[i].trim();
    if (l.length === 0) continue;
    if (l.length > 120) continue; // Too long to be a heading

    // Skip standalone numbers (like "1", "2", "3") which precede "Chapter N" lines
    if (/^\d+$/.test(l)) continue;

    // Skip lines like "Figure 2.1", "Table 3.2" etc
    if (/^(Figure|Table|Chart|Diagram)\s+\d/i.test(l)) continue;

    // Skip known non-heading lines
    if (/^(Cover|Title Page|Table of Contents|Start of Content|Landmarks)$/i.test(l)) continue;

    // Check if this line matches a TOC entry exactly
    if (tocSet[l]) {
      if (!seen[l]) {
        seen[l] = true;
        chapters.push({ lineNum: i, title: l });
      }
      continue;
    }

    // Check against chapter patterns
    for (var p = 0; p < chapterPatterns.length; p++) {
      if (chapterPatterns[p].test(l)) {
        // For "Chapter N\nTitle" pattern: check if next non-blank line is the title
        if (/^Chapter\s+\d+$/i.test(l)) {
          // Find next non-blank line
          for (var k = i + 1; k < Math.min(i + 5, lines.length); k++) {
            var nl = lines[k].trim();
            if (nl.length > 0) {
              // This is likely the chapter title text - skip the "Chapter N" line
              // The actual section headings (like "1.1 Introduction") will be caught separately
              break;
            }
          }
          break; // Don't add "Chapter N" standalone as a heading
        }
        if (!seen[l]) {
          seen[l] = true;
          chapters.push({ lineNum: i, title: l });
        }
        break;
      }
    }
  }

  return chapters;
}

/* ───────── FRONT/BACK MATTER STRIPPING ───────── */
function stripMatter(text, chapters) {
  if (chapters.length === 0) return text;

  var lines = text.split('\n');

  // Find where real content begins: the first chapter heading in the text
  var firstChapLine = chapters[0].lineNum;

  // Find back matter: look from the end for known back-matter keywords
  var backKeywords = /^(Notes|End\s*notes|Acknowledgments?|Acknowledgements?|Bibliography|References|Appendix|Index|About the Author|Credits|Permissions|Sources|Glossary|Further Reading|Works Cited|Suggested Reading|Afterword|Colophon|Copyright)$/i;
  var lastContentLine = lines.length;

  // Find the last real chapter (not appendix/back matter)
  // We consider the appendix section as back matter
  var backMatterKeywordsInChapters = /^(Appendix|Notes|Acknowledgments?|Bibliography|Index|About the Author|Glossary|Further Reading|Works Cited|References)/i;
  var lastBodyChapterIdx = chapters.length - 1;
  for (var c = chapters.length - 1; c >= 0; c--) {
    if (backMatterKeywordsInChapters.test(chapters[c].title)) {
      lastBodyChapterIdx = c - 1;
    } else {
      break;
    }
  }

  // Also scan from end of file for back matter section headers
  for (var i = lines.length - 1; i > 0; i--) {
    var l = lines[i].trim();
    if (backKeywords.test(l)) {
      // This might be back matter start - but only if it's after most chapters
      if (lastBodyChapterIdx >= 0 && i > chapters[lastBodyChapterIdx].lineNum) {
        lastContentLine = i;
      }
      break;
    }
  }

  // Build stripped text: from first chapter to last content line
  var result = lines.slice(firstChapLine, lastContentLine).join('\n');
  return result;
}

/* ───────── BUILD TITLE PAGE TEXT ───────── */
function buildTitlePage(meta, chapters) {
  var parts = [];
  if (meta.title) parts.push(meta.title);
  if (meta.author) parts.push(meta.author);
  if (meta.translator) parts.push('Translated by ' + meta.translator);
  if (meta.year) parts.push(meta.year);
  parts.push(''); // blank line
  if (chapters.length > 0) {
    parts.push('Contents');
    for (var i = 0; i < chapters.length; i++) {
      parts.push('\t' + chapters[i].title);
    }
  }
  return parts;
}

/* ───────── LOAD FONT ───────── */
async function loadFont(doc, fontName) {
  var fontFileMap = {
    'Arial': 'Arial',
    'Arial Narrow': 'Arial_Narrow',
    'Calibri': 'Calibri',
    'EB Garamond': 'EB_Garamond',
    'Garamond': 'Garamond',
    'Georgia': 'Georgia',
    'Roboto': 'Roboto',
    'Times New Roman': 'Times_New_Roman',
    'Verdana': 'Verdana'
  };

  if (fontName === 'Helvetica') {
    doc.setFont('helvetica', 'normal');
    return 'helvetica';
  }

  var fontFile = fontFileMap[fontName];
  if (!fontFile) {
    doc.setFont('helvetica', 'normal');
    return 'helvetica';
  }

  try {
    document.getElementById('status').textContent = 'Status: Loading font...';
    // Remove any previously loaded font script
    var oldScript = document.getElementById('font-loader');
    if (oldScript) oldScript.remove();
    // Reset global
    if (typeof window.FONT_DATA !== 'undefined') window.FONT_DATA = undefined;

    var script = document.createElement('script');
    script.id = 'font-loader';
    script.src = '/tps/fonts/' + fontFile + '.js';
    await new Promise(function (resolve, reject) {
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    });

    if (typeof FONT_DATA !== 'undefined' && FONT_DATA) {
      doc.addFileToVFS(fontFile + '.ttf', FONT_DATA);
      doc.addFont(fontFile + '.ttf', fontFile, 'normal');
      doc.setFont(fontFile, 'normal');
      window.FONT_DATA = undefined;
      return fontFile;
    }
  } catch (e) {
    console.warn('Font load failed for ' + fontName + ', falling back to Helvetica', e);
  }

  doc.setFont('helvetica', 'normal');
  return 'helvetica';
}

/* ───────── GENERATE PDF ───────── */
async function generate() {
  if (!rawText) return;
  document.getElementById('status').textContent = 'Status: Generating PDF...';
  document.getElementById('gen-btn').disabled = true;

  try {
    await _generate();
  } catch (e) {
    console.error(e);
    document.getElementById('status').textContent = 'Status: Error - ' + e.message;
  }
  document.getElementById('gen-btn').disabled = false;
}

async function _generate() {
  /* Read settings */
  var fontName = document.getElementById('font-select').value;
  var fontSize = parseInt(document.getElementById('size-select').value);
  var colorScheme = document.getElementById('color-select').value;
  var margin = parseFloat(document.getElementById('margin-select').value);
  var align = document.getElementById('align-select').value;
  var cutMatter = document.getElementById('matter-select').value === 'cut';

  /* Clean text */
  var text = cleanText(rawText);

  /* Detect metadata */
  var meta = detectMeta(text);

  /* Detect chapters from full text */
  var chapters = detectChapters(text);

  /* Strip front/back matter if requested */
  if (cutMatter && chapters.length > 0) {
    text = stripMatter(text, chapters);
    // Re-detect chapters in the stripped text
    chapters = detectChapters(text);
  }

  /* Clean the body text */
  // Remove the TOC section from the body text (it's already in the title page)
  // Find "Contents" followed by TOC entries, and remove everything up to the first real paragraph
  var contentsIdx = text.search(/^Contents\s*$/m);
  if (contentsIdx >= 0) {
    // Find where the TOC ends: first line longer than 120 chars (body paragraph) or first chapter heading after TOC
    var afterContents = text.substring(contentsIdx);
    var tocLines = afterContents.split('\n');
    var tocEndOffset = 0;
    var pastContentsHeader = false;
    for (var ti = 0; ti < tocLines.length; ti++) {
      tocEndOffset += tocLines[ti].length + 1;
      if (ti === 0) { pastContentsHeader = true; continue; }
      var tl = tocLines[ti].trim();
      // TOC entries are short. When we hit a long line or known body start markers, stop.
      if (pastContentsHeader && tl.length > 120) break;
      if (tl === 'Landmarks' || tl === 'Start of Content' || tl === 'Cover' || tl === 'Title Page') {
        // Skip these navigation markers too
        continue;
      }
    }
    text = text.substring(0, contentsIdx) + text.substring(contentsIdx + tocEndOffset);
  }
  // Remove "Chapter N" standalone lines
  text = text.replace(/^Chapter\s+\d+\s*$/gm, '');
  // Remove standalone number lines
  text = text.replace(/^\d+\s*$/gm, '');
  // Remove "Figure X.Y" caption lines
  text = text.replace(/^Figure\s+\d+[^\n]*\n[^\n]*$/gm, '');
  // Remove navigation markers
  text = text.replace(/^(Landmarks|Start of Content|Cover|Title Page|Table of Contents)\s*$/gm, '');
  // Collapse 3+ blank lines to 2
  text = text.replace(/\n{3,}/g, '\n\n');

  /* Build chapter heading set for quick lookup */
  var chapterSet = {};
  for (var c = 0; c < chapters.length; c++) {
    chapterSet[chapters[c].title] = true;
  }

  /* Parse text into structured blocks */
  var blocks = []; // {type:'heading'|'para', text:string}
  var rawLines = text.split('\n');
  var currentPara = [];

  function flushPara() {
    if (currentPara.length > 0) {
      var joined = currentPara.join(' ').trim();
      if (joined.length > 0) {
        blocks.push({ type: 'para', text: joined });
      }
      currentPara = [];
    }
  }

  for (var i = 0; i < rawLines.length; i++) {
    var line = rawLines[i].trim();

    if (line.length === 0) {
      // Blank line = paragraph break
      flushPara();
      continue;
    }

    // Check if this line is a chapter heading
    if (chapterSet[line]) {
      flushPara();
      blocks.push({ type: 'heading', text: line });
      continue;
    }

    // Otherwise it's body text - accumulate into current paragraph
    currentPara.push(line);
  }
  flushPara();

  /* ───────── BUILD PDF ───────── */
  var jsPDF = window.jspdf.jsPDF;
  var bgColor = colorScheme === 'black' ? '#000000' : colorScheme === 'gray' ? '#2a2a2a' : '#FFFFFF';
  var txtColor = colorScheme === 'white' ? '#000000' : '#FFFFFF';
  var pw = 612, ph = 792; // letter size in points

  var doc = new jsPDF({ unit: 'pt', format: 'letter' });
  var lineH = fontSize * 1.2;
  var cw = pw - margin * 2;
  var tabW = fontSize * 1.5; // width of two "tabs" approximation

  /* Load font */
  var loadedFont = await loadFont(doc, fontName);

  doc.setFontSize(fontSize);

  /* Helper: fill background on current page */
  function fillBg() {
    doc.setFillColor(bgColor);
    doc.rect(0, 0, pw, ph, 'F');
    doc.setTextColor(txtColor);
  }

  /* Helper: add a new page with background */
  function newPage() {
    doc.addPage();
    fillBg();
  }

  /* ───── TITLE PAGE ───── */
  fillBg();
  var y = margin + lineH;

  // Title (same size as body)
  if (meta.title) {
    var titleLines = doc.splitTextToSize(meta.title, cw);
    for (var t = 0; t < titleLines.length; t++) {
      doc.text(titleLines[t], margin, y);
      y += lineH;
    }
  }
  // Author (no extra space)
  if (meta.author) {
    doc.text(meta.author, margin, y);
    y += lineH;
  }
  if (meta.translator) {
    doc.text('Translated by ' + meta.translator, margin, y);
    y += lineH;
  }
  if (meta.year) {
    doc.text(meta.year, margin, y);
    y += lineH;
  }
  // One blank line before Contents
  y += lineH;
  // Contents
  if (chapters.length > 0) {
    doc.text('Contents', margin, y);
    y += lineH;
    for (var i = 0; i < chapters.length; i++) {
      if (y > ph - margin - lineH) {
        newPage();
        y = margin + lineH;
      }
      var tocLines = doc.splitTextToSize(chapters[i].title, cw - tabW);
      for (var tl = 0; tl < tocLines.length; tl++) {
        doc.text(tocLines[tl], margin + tabW, y);
        y += lineH;
      }
    }
  }

  /* ───── BODY PAGES ───── */
  // Start body on new page
  newPage();
  y = margin + lineH;

  for (var b = 0; b < blocks.length; b++) {
    var block = blocks[b];

    if (block.type === 'heading') {
      // Only major chapters get page breaks (single number like "1 Intro", "2 Orgs", "Preface")
      // Subsections (2.1, 2.2.1 etc.) do NOT get page breaks
      var isMajor = /^(Preface|Prologue|Epilogue|Introduction|Conclusion|Foreword|Afterword)$/i.test(block.text)
        || /^(Chapter\s+)/i.test(block.text)
        || /^(Part\s+)/i.test(block.text)
        || /^\d+\s+[A-Z]/.test(block.text) && !/^\d+\./.test(block.text);
      if (isMajor && (b > 0 || y > margin + lineH * 2)) {
        newPage();
        y = margin + lineH;
      }
      // Render heading same font size, no indent, wrapped within margins
      var headLines = doc.splitTextToSize(block.text, cw);
      for (var h = 0; h < headLines.length; h++) {
        if (y > ph - margin) {
          newPage();
          y = margin + lineH;
        }
        doc.text(headLines[h], margin, y);
        y += lineH;
      }
      continue;
    }

    /* Body paragraph: indented with two tabs, fully justified */
    var paraText = block.text;

    // Two-tab indent: we reduce available width and offset x
    var indentX = margin + tabW;
    var paraWidth = cw - tabW;

    // Split text to fit within paragraph width
    var wrapped = doc.splitTextToSize(paraText, paraWidth);

    for (var w = 0; w < wrapped.length; w++) {
      if (y > ph - margin) {
        newPage();
        y = margin + lineH;
      }

      var lineText = wrapped[w];
      var xPos = (w === 0) ? indentX : margin; // only first line indented
      var lineWidth = (w === 0) ? paraWidth : cw;

      if (align === 'justify' && w < wrapped.length - 1 && lineText.trim().length > 0) {
        // Justify: distribute words across the line width
        renderJustifiedLine(doc, lineText, xPos, y, lineWidth);
      } else {
        doc.text(lineText, xPos, y);
      }
      y += lineH;
    }
    // No extra space between paragraphs (single-spaced, no gap)
  }

  /* ───── REMOVE TRAILING BLANK PAGES ───── */
  // jsPDF pages are 1-indexed
  var totalPages = doc.internal.getNumberOfPages();
  // We shouldn't have blank pages, but just in case
  while (totalPages > 1) {
    doc.setPage(totalPages);
    // Can't easily detect blank - just trust the flow
    break;
  }

  /* ───── GENERATE FILENAME ───── */
  var fname = '';
  if (meta.author) {
    var authorParts = meta.author.trim().split(/\s+/);
    fname = authorParts[authorParts.length - 1];
  }
  if (meta.title) {
    fname += (fname ? ' - ' : '') + meta.title;
  }
  if (!fname && inputFile) {
    fname = inputFile.name.replace(/\.[^.]+$/, '').substring(0, 30);
  }
  if (!fname) fname = 'output';
  // Sanitize
  fname = fname.replace(/[<>:"/\\|?*]/g, '').trim();
  if (fname.length > 80) fname = fname.substring(0, 80).trim();

  doc.save(fname + '.pdf');
  document.getElementById('status').textContent = 'Status: Done! Saved as ' + fname + '.pdf';
}

/* ───────── JUSTIFIED TEXT RENDERER ───────── */
function renderJustifiedLine(doc, lineText, x, y, maxWidth) {
  var words = lineText.trim().split(/\s+/);
  if (words.length <= 1) {
    doc.text(lineText, x, y);
    return;
  }

  // Calculate total width of all words
  var totalWordWidth = 0;
  for (var i = 0; i < words.length; i++) {
    totalWordWidth += doc.getTextWidth(words[i]);
  }

  var totalSpace = maxWidth - totalWordWidth;
  var spaceWidth = totalSpace / (words.length - 1);

  if (spaceWidth < 0) {
    doc.text(lineText, x, y);
    return;
  }

  var cx = x;
  for (var i = 0; i < words.length; i++) {
    doc.text(words[i], cx, y);
    cx += doc.getTextWidth(words[i]) + spaceWidth;
  }
}
