<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="/images/Favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/images/Favicon-192.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2a2a2a">
<title>Erik's Textualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#2a2a2a;color:white;font:normal 16pt/1.1 'EB Garamond',serif;margin:0 auto;padding:20px;max-width:700px}
h1{font-size:28pt;font-weight:400;text-align:center;margin:0 0 8pt;line-height:1}
h2{font-size:20pt;font-weight:400;text-align:center;margin:0 0 16pt;line-height:1}

button{background:#fff;color:#2a2a2a;border:none;font:16pt 'EB Garamond',serif;cursor:pointer;padding:4px 14px;white-space:nowrap}
button:hover{background:#ccc}
button:disabled{background:#555;color:#888;cursor:default}

.btn-row{display:flex;justify-content:center;gap:12px;margin:0 0 8pt;flex-wrap:wrap}
.btn-row button{min-width:140px;max-width:200px}
.action-btn{display:block;margin:0 auto 8pt;min-width:180px;max-width:250px}
#file-info{text-align:center;font-size:14pt;color:#fff;margin:0 0 8pt}
#status{text-align:center;font-size:16pt;color:#fff;margin:0 0 8pt}
#rec-indicator{text-align:center;font-size:14pt;color:#ff4444;margin:0 0 8pt;display:none}

#output{
  width:100%;height:150px;background:transparent;
  border:1px solid #fff;color:#fff;font:16pt 'EB Garamond',serif;
  padding:10px;resize:none;overflow-y:auto;display:block;margin:0 0 8pt;
}
#output::placeholder{color:#666;font-family:'EB Garamond',serif}
#output:focus{outline:none;border-color:#fff}

.dl-row{display:flex;justify-content:center;gap:8px;margin:0 0 8pt}
.dl-row button{display:none}

#waveform-area{width:100%;height:80px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;margin:0 0 8pt}
#waveform-area canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#music-note{font-size:40pt;color:#666;position:absolute;user-select:none}

.hidden-input{display:none}
@media(max-width:600px){.sub-break{display:block;font-size:0;line-height:0}}
</style>
</head>
<body>

<img src="/images/SpeechToTexterLogo.png" alt="STT" style="width:100px;height:100px;display:block;margin:0 auto 8pt;border-radius:50%">
<h1>Erik's Textualizer</h1>
<h2><em>Write With Your Mouth</em>:<span class="sub-break"> </span>A Speech-to-Text Tool</h2>

<div class="btn-row">
  <button id="upload-btn" onclick="document.getElementById('file-input').click()">Upload Audio</button>
  <button id="record-btn" onclick="toggleRecord()">Record</button>
</div>
<input type="file" id="file-input" class="hidden-input" accept="audio/*,.mp3,.m4a,.m4b,.wav,.ogg,.webm,.mp4,.flac,.aac">

<div id="file-info">No file selected</div>
<div id="rec-indicator">Recording...</div>

<button id="transcribe-btn" class="action-btn" onclick="transcribe()" disabled>Transcribe</button>

<div id="status">Status: Ready</div>

<textarea id="output" placeholder="Transcribed text will appear here..." readonly></textarea>

<div id="waveform-area"><canvas id="waveform-canvas"></canvas><span id="music-note">&#9835;</span></div>

<div class="dl-row">
  <button id="dl-text" onclick="downloadText()">Download Text</button>
  <button id="replay-btn" onclick="replayAudio()">Replay Audio</button>
  <button id="dl-audio" onclick="downloadAudio()">Download Audio</button>
</div>

<script>
let audioBlob = null;
let audioFileName = '';
let audioUrl = '';
let replayEl = null;
let mediaRecorder = null;
let recordChunks = [];
let isRecording = false;
let liveRecognition = null;
let liveFinalText = '';

function fmtSize(bytes){
  const mb=bytes/1048576;
  if(mb<0.05) return '0.1MB';
  if(mb<0.5) return mb.toFixed(1)+'MB';
  return Math.round(mb)+'MB';
}
function sanitizeName(name, maxLen){
  name = name.replace(/\.[^.]+$/,'').toLowerCase();
  return name.replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'').substring(0, maxLen||20);
}
document.getElementById('file-input').onchange = function(){
  const file = this.files[0];
  if(!file) return;
  audioBlob = file;
  audioFileName = file.name;
  if(audioUrl) URL.revokeObjectURL(audioUrl);
  audioUrl = URL.createObjectURL(file);
  document.getElementById('file-info').textContent = file.name+', '+fmtSize(file.size);
  document.getElementById('upload-btn').textContent = 'Replace Audio';
  document.getElementById('transcribe-btn').disabled = false;
  document.getElementById('replay-btn').style.display = 'inline-block';
  document.getElementById('dl-text').style.display = 'none';
  document.getElementById('dl-audio').style.display = 'none';
  document.getElementById('output').value = '';
  drawWaveform(file);
};
async function toggleRecord(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(isRecording){
    isRecording = false;
    if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    if(liveRecognition) try { liveRecognition.stop(); } catch(e){}
    document.getElementById('record-btn').textContent = 'Record';
    document.getElementById('rec-indicator').style.display = 'none';
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    isRecording = true;
    liveFinalText = '';
    document.getElementById('output').value = '';
    document.getElementById('record-btn').textContent = 'Stop';
    document.getElementById('rec-indicator').style.display = 'block';
    document.getElementById('status').textContent = 'Status: Recording and transcribing live';
    document.getElementById('dl-text').style.display = 'none';
    document.getElementById('dl-audio').style.display = 'none';
    document.getElementById('replay-btn').style.display = 'none';
    document.getElementById('waveform-area').style.display = 'none';
    let recognitionActive = false;
    if(SR){
      liveRecognition = new SR();
      liveRecognition.lang = 'en-US';
      liveRecognition.continuous = true;
      liveRecognition.interimResults = true;

      liveRecognition.onresult = (e) => {
        let interim = '';
        for(let i=e.resultIndex; i<e.results.length; i++){
          if(e.results[i].isFinal) liveFinalText += e.results[i][0].transcript + ' ';
          else interim += e.results[i][0].transcript;
        }
        document.getElementById('output').value = liveFinalText + interim;
        document.getElementById('output').scrollTop = document.getElementById('output').scrollHeight;
      };
      liveRecognition.onend = () => {
        if(isRecording){
          try { liveRecognition.start(); } catch(e){
            setTimeout(() => {
              if(isRecording) try { liveRecognition.start(); } catch(e2){}
            }, 500);
          }
        }
      };
      liveRecognition.onerror = (e) => {
        if(e.error==='no-speech' && isRecording) return;
        if(e.error==='aborted' && isRecording){
          setTimeout(() => {
            if(isRecording) try { liveRecognition.start(); } catch(e2){}
          }, 500);
          return;
        }
        if(e.error==='not-allowed'){
          document.getElementById('status').textContent = 'Status: Speech recognition denied';
        }
      };
      try {
        liveRecognition.start();
        recognitionActive = true;
      } catch(e){
      }
    }
    recordChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' :
                     MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '';
    mediaRecorder = new MediaRecorder(stream, mimeType ? {mimeType} : {});
    mediaRecorder.ondataavailable = (e) => { if(e.data.size>0) recordChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t=>t.stop());
      const recType = mimeType || 'audio/webm';
      audioBlob = new Blob(recordChunks, {type:recType});
      audioFileName = 'recording.mp3';
      if(audioUrl) URL.revokeObjectURL(audioUrl);
      audioUrl = URL.createObjectURL(audioBlob);

      document.getElementById('file-info').textContent = 'Recording, '+fmtSize(audioBlob.size);
      document.getElementById('replay-btn').style.display = 'inline-block';
      document.getElementById('dl-audio').style.display = 'inline-block';
      drawWaveform(audioBlob);
      setTimeout(() => {
        const text = document.getElementById('output').value.trim() || liveFinalText.trim();
        if(text) document.getElementById('output').value = text;
        const wc = text.split(/\s+/).filter(Boolean).length;
        document.getElementById('status').textContent = wc > 0 ? `Status: Done, ${wc} words` : 'Status: Done';
        document.getElementById('dl-text').style.display = 'inline-block';
      }, 3000); // 3s delay for mobile to finish processing
    };
    mediaRecorder.start(1000); // Collect data every 1s (helps mobile)
  } catch(e){
    document.getElementById('status').textContent = 'Status: Microphone access denied';
    isRecording = false;
  }
}
function transcribe(){
  if(!audioBlob){
    document.getElementById('status').textContent = 'Status: No audio to transcribe';
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('status').textContent = 'Status: Speech recognition not supported, use Chrome';
    return;
  }

  document.getElementById('status').textContent = 'Status: Playing audio for transcription, keep volume up...';
  document.getElementById('transcribe-btn').disabled = true;
  document.getElementById('output').value = '';
  document.getElementById('dl-text').style.display = 'none';

  const playEl = new Audio(audioUrl);
  let finalTranscript = '';

  const recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = (e) => {
    let interim = '';
    for(let i=e.resultIndex; i<e.results.length; i++){
      if(e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('output').value = finalTranscript + interim;
    document.getElementById('output').scrollTop = document.getElementById('output').scrollHeight;
  };

  recognition.onerror = (e) => {
    if(e.error==='no-speech' && !playEl.paused && !playEl.ended){
      try { recognition.start(); } catch(ex){}
    }
  };

  recognition.onend = () => {
    if(!playEl.paused && !playEl.ended){
      try { recognition.start(); } catch(e){}
    } else {
      document.getElementById('output').value = finalTranscript.trim();
      const wc = finalTranscript.trim().split(/\s+/).filter(Boolean).length;
      document.getElementById('status').textContent = `Status: Done, ${wc} words`;
      document.getElementById('transcribe-btn').disabled = false;
      if(wc > 0) document.getElementById('dl-text').style.display = 'inline-block';
    }
  };

  playEl.onended = () => {
    setTimeout(()=>{ try { recognition.stop(); } catch(e){} }, 2000);
  };

  recognition.start();
  playEl.volume = 1.0;
  playEl.play();
}
function replayAudio(){
  if(!audioUrl) return;
  if(replayEl && !replayEl.paused){
    replayEl.pause(); replayEl.currentTime=0;
    document.getElementById('replay-btn').textContent='Replay Audio';
    return;
  }
  replayEl = new Audio(audioUrl);
  replayEl.play();
  document.getElementById('replay-btn').textContent = 'Stop Replay';
  replayEl.onended = () => { document.getElementById('replay-btn').textContent = 'Replay Audio'; };
}
function getOutputName(){
  if(audioFileName && audioFileName !== 'recording.mp3' && audioFileName !== 'recording.webm'){
    return sanitizeName(audioFileName, 20);
  }
  const text = document.getElementById('output').value.trim();
  if(text) return sanitizeName(text.substring(0, 40), 20);
  return 'recording';
}

function downloadText(){
  const text = document.getElementById('output').value;
  if(!text) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type:'text/plain'}));
  a.download = `stt_ejm_${getOutputName()}.txt`;
  a.click();
}

function downloadAudio(){
  if(!audioUrl) return;
  const a = document.createElement('a');
  a.href = audioUrl;
  a.download = `stt_ejm_${getOutputName()}.mp3`;
  a.click();
}
async function drawWaveform(fileOrBlob){
  const area = document.getElementById('waveform-area');
  const canvas = document.getElementById('waveform-canvas');
  const ctx = canvas.getContext('2d');
  area.style.display = 'flex';
  var mn = document.getElementById('music-note'); if(mn) mn.style.display='none';
  const W = area.clientWidth; canvas.width = W; canvas.height = 60;
  ctx.clearRect(0, 0, W, 60);
  // Loading indicator: thin centerline
  ctx.fillStyle = '#888';
  for(let x=0; x<W; x++) ctx.fillRect(x, 29, 1, 2);
  let actx;
  try {
    const buf = await fileOrBlob.arrayBuffer();
    actx = new (window.AudioContext||window.webkitAudioContext)();
    const decoded = await new Promise((resolve, reject) => {
      actx.decodeAudioData(buf.slice(0), resolve, reject);
    });
    const data = decoded.getChannelData(0);
    const samplesPerPx = Math.max(1, Math.floor(data.length / W));
    ctx.clearRect(0, 0, W, 60);
    ctx.fillStyle = '#fff';
    const mid = 30;
    for(let x=0; x<W; x++){
      const start = x * samplesPerPx;
      const end = Math.min(data.length, start + samplesPerPx);
      let peak = 0;
      for(let i=start; i<end; i++){
        const v = Math.abs(data[i]);
        if(v > peak) peak = v;
      }
      const h = Math.max(1, peak * 56);
      ctx.fillRect(x, mid - h/2, 1, h);
    }
  } catch(e){
    console.warn('STT waveform decode failed', e);
    ctx.clearRect(0, 0, W, 60);
    ctx.fillStyle = '#fff';
    for(let x=0; x<W; x++) ctx.fillRect(x, 29, 1, 2);
  } finally {
    if(actx) try { actx.close(); } catch(e){}
  }
}
document.addEventListener('keydown',(e)=>{
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  if(e.ctrlKey && e.key==='Enter' && audioBlob){ e.preventDefault(); transcribe(); }
});
</script>
