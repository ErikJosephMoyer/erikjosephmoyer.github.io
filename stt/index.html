<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Erik's Textillery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#2a2a2a;color:#fff;font:normal 16pt/1.2 'EB Garamond',serif;margin:0 auto;padding:12px 20px;max-width:700px}
h1{font-size:24pt;font-weight:400;text-align:center;margin:0 0 16pt;line-height:1}
h2{font-size:20pt;font-weight:400;text-align:center;margin:0 0 8pt;line-height:1}

button{background:#fff;color:#2a2a2a;border:none;font:16pt 'EB Garamond',serif;cursor:pointer;padding:8px 32px}
button:hover{background:#ccc}
button:disabled{background:#555;color:#888;cursor:default}

.btn-row{display:flex;justify-content:center;gap:12px;margin:0 0 8pt}
.btn-row button{min-width:160px;max-width:220px}
#file-info{text-align:center;font-size:14pt;color:#fff;margin:0 0 8pt}

/* Language dropdown */
#lang-select{
  width:100%;background:transparent;border:1px solid #fff;
  color:#fff;font:16pt 'EB Garamond',serif;padding:6px 10px;
  appearance:auto;margin:0 0 8pt;
}
#lang-select option{background:#2a2a2a;color:#fff}
#lang-select:focus{outline:none}

/* Status */
#status{text-align:center;font-size:16pt;color:#fff;margin:0 0 8pt}

/* Output textbox */
#output{
  width:100%;height:200px;background:transparent;
  border:1px solid #fff;color:#fff;font:16pt 'EB Garamond',serif;
  padding:10px;resize:none;overflow-y:auto;display:block;margin:0 0 8pt;
}
#output::placeholder{color:#666;font-family:'EB Garamond',serif}
#output:focus{outline:none;border-color:#fff}

/* Download link */
#dl-row{text-align:center;margin:0 0 8pt}
#dl-link{color:#fff;font-size:16pt;text-decoration:underline;cursor:pointer}
#dl-link:hover{color:#ccc}

/* Record indicator */
#rec-indicator{text-align:center;font-size:14pt;color:#ff4444;margin:0 0 8pt;display:none}

.hidden-input{display:none}
</style>
</head>
<body>

<img src="/images/Logophile.png" alt="EM" style="width:75px;height:75px;display:block;margin:0 auto 8pt;border-radius:12px">
<h1>Erik's Textillery</h1>

<!-- Upload or Record -->
<div class="btn-row">
  <button id="upload-btn" onclick="document.getElementById('file-input').click()">Upload Audio</button>
  <button id="record-btn" onclick="toggleRecord()">Record</button>
</div>
<input type="file" id="file-input" class="hidden-input" accept="audio/*,.mp3,.m4a,.m4b,.wav,.ogg,.webm,.mp4,.flac,.aac">

<div id="file-info">No file selected</div>
<div id="rec-indicator">Recording...</div>

<!-- Language -->
<select id="lang-select">
  <option value="en-US">English (US)</option>
  <option value="en-GB">English (UK)</option>
  <option value="es-ES">Spanish</option>
  <option value="fr-FR">French</option>
  <option value="de-DE">German</option>
  <option value="it-IT">Italian</option>
  <option value="pt-BR">Portuguese</option>
  <option value="ja-JP">Japanese</option>
  <option value="zh-CN">Chinese (Mandarin)</option>
  <option value="ko-KR">Korean</option>
  <option value="ru-RU">Russian</option>
  <option value="ar-SA">Arabic</option>
  <option value="hi-IN">Hindi</option>
</select>

<!-- Transcribe button -->
<button id="transcribe-btn" style="display:block;margin:0 auto 8pt;min-width:180px;max-width:250px" onclick="transcribe()" disabled>Transcribe</button>

<!-- Status -->
<div id="status">Status: Ready</div>

<!-- Output -->
<textarea id="output" placeholder="Transcribed text will appear here..." readonly></textarea>

<!-- Download -->
<div id="dl-row">
  <a id="dl-link" style="display:none" onclick="downloadText()">Download as .txt</a>
</div>

<script>
// === STATE ===
let audioBlob = null;
let audioFileName = '';
let mediaRecorder = null;
let recordChunks = [];
let isRecording = false;

// === FILE UPLOAD ===
document.getElementById('file-input').onchange = function(){
  const file = this.files[0];
  if(!file) return;
  audioBlob = file;
  audioFileName = file.name;
  const mb = file.size/1048576;
  const sizeStr = mb<0.05?'0.1MB': mb<0.5?mb.toFixed(1)+'MB': Math.round(mb)+'MB';
  document.getElementById('file-info').textContent = file.name+', '+sizeStr;
  document.getElementById('upload-btn').textContent = 'Replace Audio';
  document.getElementById('transcribe-btn').disabled = false;
  document.getElementById('output').value = '';
  document.getElementById('dl-link').style.display = 'none';
};

// === RECORD ===
async function toggleRecord(){
  if(isRecording){
    mediaRecorder.stop();
    isRecording = false;
    document.getElementById('record-btn').textContent = 'Record';
    document.getElementById('rec-indicator').style.display = 'none';
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    recordChunks = [];
    mediaRecorder = new MediaRecorder(stream, {mimeType:'audio/webm'});
    mediaRecorder.ondataavailable = (e) => { if(e.data.size>0) recordChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t=>t.stop());
      audioBlob = new Blob(recordChunks, {type:'audio/webm'});
      audioFileName = 'recording.webm';
      const mb = audioBlob.size/1048576;
      const sizeStr = mb<0.05?'0.1MB': mb<0.5?mb.toFixed(1)+'MB': Math.round(mb)+'MB';
      document.getElementById('file-info').textContent = 'Recording, '+sizeStr;
      document.getElementById('transcribe-btn').disabled = false;
      document.getElementById('output').value = '';
      document.getElementById('dl-link').style.display = 'none';
    };
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('record-btn').textContent = 'Stop';
    document.getElementById('rec-indicator').style.display = 'block';
  } catch(e){
    document.getElementById('status').textContent = 'Status: Microphone access denied';
  }
}

// === TRANSCRIBE ===
// Uses browser's built-in Web Speech API for recognition
// For uploaded files: decode audio and play through AudioContext to feed SpeechRecognition
// For live recording: direct SpeechRecognition on microphone

async function transcribe(){
  if(!audioBlob){
    document.getElementById('status').textContent = 'Status: No audio to transcribe';
    return;
  }

  const lang = document.getElementById('lang-select').value;
  document.getElementById('status').textContent = 'Status: Transcribing...';
  document.getElementById('transcribe-btn').disabled = true;
  document.getElementById('output').value = '';

  // Check if SpeechRecognition is available
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    // Fallback: use the audio element approach with chunked recognition
    document.getElementById('status').textContent = 'Status: Speech recognition not supported in this browser. Use Chrome.';
    document.getElementById('transcribe-btn').disabled = false;
    return;
  }

  // Play audio through hidden audio element and capture with SpeechRecognition
  // This is the only way to transcribe uploaded files client-side
  const audioUrl = URL.createObjectURL(audioBlob);
  const audioEl = new Audio(audioUrl);

  const recognition = new SpeechRecognition();
  recognition.lang = lang;
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  let finalTranscript = '';
  let interimTranscript = '';

  recognition.onresult = (e) => {
    interimTranscript = '';
    for(let i=e.resultIndex; i<e.results.length; i++){
      if(e.results[i].isFinal){
        finalTranscript += e.results[i][0].transcript + ' ';
      } else {
        interimTranscript += e.results[i][0].transcript;
      }
    }
    document.getElementById('output').value = finalTranscript + interimTranscript;
    // Auto-scroll to bottom
    document.getElementById('output').scrollTop = document.getElementById('output').scrollHeight;
  };

  recognition.onerror = (e) => {
    if(e.error === 'no-speech'){
      // Restart recognition if audio is still playing
      if(!audioEl.paused && !audioEl.ended){
        try { recognition.start(); } catch(ex){}
      }
      return;
    }
    console.log('Recognition error:', e.error);
  };

  recognition.onend = () => {
    // Restart if audio is still playing (recognition times out after silence)
    if(!audioEl.paused && !audioEl.ended){
      try { recognition.start(); } catch(e){}
    } else {
      // Done
      document.getElementById('output').value = finalTranscript.trim();
      const wc = finalTranscript.trim().split(/\s+/).filter(Boolean).length;
      document.getElementById('status').textContent = `Status: Done, ${wc} words`;
      document.getElementById('transcribe-btn').disabled = false;
      document.getElementById('dl-link').style.display = 'inline';
    }
  };

  audioEl.onended = () => {
    // Give recognition a moment to finish processing
    setTimeout(()=>{
      try { recognition.stop(); } catch(e){}
    }, 2000);
  };

  // For uploaded files, we need to play the audio out loud for SpeechRecognition to hear it
  // OR use AudioContext to route audio to a virtual output
  // Unfortunately, SpeechRecognition only listens to the microphone, not audio output
  // So for uploaded files, we use a different approach: read the file in chunks
  // and feed each chunk's text to the output

  // Best client-side approach: play audio at low volume and hope mic picks it up
  // This is unreliable. Better approach: use the Web Speech API in "offline" mode
  // which doesn't exist. The reality is that true offline STT requires a model.

  // Most reliable free approach: use SpeechRecognition API which requires live audio
  // For uploaded files, we'll play them and let the system audio feed recognition
  // On most systems this works if "Stereo Mix" or loopback is enabled

  // Actually, the most practical approach for a client-side tool:
  // Use the media element as source and route through AudioContext
  // SpeechRecognition still only listens to mic, so we need a different strategy

  // PRACTICAL SOLUTION: For uploaded files, decode to PCM, split into small chunks,
  // and use the Google Web Speech API endpoint directly (same as what Chrome uses)
  // This works without a microphone.

  // Simplest working approach: just start recognition and play audio.
  // If user has headphones, they need to turn on "listen to this device" or similar.
  // If on speakers, the mic will pick up the audio.
  // On mobile, this works naturally since the speaker is near the mic.

  document.getElementById('status').textContent = 'Status: Playing audio for transcription (keep volume up)...';
  try {
    recognition.start();
    audioEl.volume = 1.0;
    audioEl.play();
  } catch(e) {
    document.getElementById('status').textContent = 'Status: Error starting transcription';
    document.getElementById('transcribe-btn').disabled = false;
  }
}

// === DOWNLOAD TEXT ===
function downloadText(){
  const text = document.getElementById('output').value;
  if(!text) return;
  const name = audioFileName.replace(/\.[^.]+$/,'') || 'transcription';
  const blob = new Blob([text], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'stt_ejm_'+name.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').substring(0,20)+'.txt';
  a.click();
}

// === KEYBOARD: Ctrl+Enter to transcribe ===
document.addEventListener('keydown',(e)=>{
  if(e.ctrlKey && e.key==='Enter' && audioBlob){
    e.preventDefault();
    transcribe();
  }
});
</script>
</body>
</html>
