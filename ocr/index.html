<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="/images/Favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/images/Favicon-192.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2a2a2a">
<title>Erik's Decipherer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#2a2a2a;color:white;font:normal 16pt/1.1 'EB Garamond',serif;margin:0 auto;padding:20px;max-width:700px}
h1{font-size:28pt;font-weight:400;text-align:center;margin:0 0 8pt;line-height:1}
h2{font-size:20pt;font-weight:400;text-align:center;margin:0 0 16pt;line-height:1}
button{background:#fff;color:#2a2a2a;border:none;font:16pt 'EB Garamond',serif;cursor:pointer;padding:4px 14px;white-space:nowrap}
button:hover{background:#ccc}
button:disabled{background:#555;color:#888;cursor:default}
#upload-btn,#run-btn{display:block;margin:0 auto 8pt;min-width:180px;max-width:250px}
#file-info{text-align:center;font-size:14pt;color:white;margin:0 0 8pt}
#status{text-align:center;font-size:16pt;color:white;margin:0 0 8pt}
#preview-area{margin:0 0 8pt;text-align:center}
#preview-area img,#preview-area canvas{max-width:100%;max-height:280px;border:1px solid #555;border-radius:4px}
#output{width:100%;height:280px;background:transparent;border:1px solid #fff;color:#fff;font:14pt/1.3 'EB Garamond',serif;padding:10px;resize:vertical;margin:0 0 8pt;display:block}
#output::placeholder{color:#666}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 8pt}
.btn-row button{flex:1;min-width:120px}
#progress-bar{width:100%;height:6px;background:#444;border-radius:3px;overflow:hidden;margin:0 0 8pt}
#progress-fill{height:100%;background:#fff;width:0%;transition:width 0.2s}
#file-input{display:none}
@media(max-width:600px){.sub-break{display:block;font-size:0;line-height:0}}
</style>
</head>
<body>
<img src="/images/Favicon.png" alt="OCR" style="width:100px;height:100px;display:block;margin:0 auto 8pt;border-radius:50%">
<h1>Erik's Decipherer</h1>
<h2><em>See With Your Eyes</em>:<span class="sub-break"> </span>An Optical Character Recognition Tool</h2>

<button id="upload-btn" onclick="document.getElementById('file-input').click()">Upload Image or PDF</button>
<input type="file" id="file-input" accept="image/*,.pdf">
<div id="file-info">No file selected</div>

<div id="preview-area"></div>

<button id="run-btn" disabled onclick="runOCR()">Run OCR</button>
<div id="progress-bar"><div id="progress-fill"></div></div>
<div id="status">Status: Ready — upload an image or PDF</div>

<textarea id="output" placeholder="Recognized text will appear here..." readonly></textarea>

<div class="btn-row">
  <button id="copy-btn" disabled onclick="copyText()">Copy</button>
  <button id="dl-btn" disabled onclick="downloadTxt()">Download .txt</button>
  <button id="clear-btn" disabled onclick="clearAll()">Clear</button>
</div>

<script>
var inputFile = null;
var inputType = null;
var pdfPages = [];
var lastOutput = '';

document.getElementById('file-input').onchange = async function () {
  inputFile = this.files[0];
  if (!inputFile) return;
  var ext = inputFile.name.split('.').pop().toLowerCase();
  document.getElementById('file-info').textContent = inputFile.name + ' (' + Math.round(inputFile.size / 1024) + ' KB)';
  document.getElementById('upload-btn').textContent = 'Replace File';
  var prev = document.getElementById('preview-area');
  prev.innerHTML = '';
  pdfPages = [];

  if (ext === 'pdf') {
    inputType = 'pdf';
    document.getElementById('status').textContent = 'Status: Rendering PDF pages...';
    var pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.269/pdf.min.mjs');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.269/pdf.worker.min.mjs';
    var pdf = await pdfjsLib.getDocument({ data: await inputFile.arrayBuffer() }).promise;
    for (var i = 1; i <= pdf.numPages; i++) {
      var pg = await pdf.getPage(i);
      var vp = pg.getViewport({ scale: 2 });
      var canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      await pg.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      pdfPages.push(canvas);
    }
    var thumb = pdfPages[0].toDataURL();
    var img = document.createElement('img');
    img.src = thumb;
    prev.appendChild(img);
    document.getElementById('status').textContent = 'Status: Ready (' + pdf.numPages + ' page' + (pdf.numPages > 1 ? 's' : '') + ')';
  } else {
    inputType = 'image';
    var img = document.createElement('img');
    img.src = URL.createObjectURL(inputFile);
    prev.appendChild(img);
    document.getElementById('status').textContent = 'Status: Ready';
  }
  document.getElementById('run-btn').disabled = false;
};

/* ───────── PREPROCESSING ─────────
 * Modern Tesseract LSTM handles grayscale natively — heavy binarization
 * and icon-masking actually destroys thin character strokes ('l', 'i')
 * and ends up worse than just feeding clean grayscale.
 *
 *  1. Sample corners → detect background brightness.
 *  2. Convert to grayscale.
 *  3. Invert if bg is dark (Tesseract trained on dark-text-on-light).
 *  4. Upscale to ~2x or until long side ≥ 1800px (LSTM loves DPI).
 *
 * Trust Tesseract's own noise tolerance + the post-processor for icon junk.
 */
function preprocess(srcCanvas) {
  var W = srcCanvas.width, H = srcCanvas.height;
  var ctx = srcCanvas.getContext('2d');
  var d = ctx.getImageData(0, 0, W, H);
  var data = d.data;

  // Sample corner regions to detect background brightness
  function avgRegionLum(x, y, w, h) {
    var sum = 0, n = 0;
    for (var yy = y; yy < Math.min(y + h, H); yy++) {
      for (var xx = x; xx < Math.min(x + w, W); xx++) {
        var i = (yy * W + xx) * 4;
        sum += 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
        n++;
      }
    }
    return n > 0 ? sum / n : 0;
  }
  var bgLum = (
    avgRegionLum(0, 0, 16, 16) +
    avgRegionLum(W - 16, 0, 16, 16) +
    avgRegionLum(0, H - 16, 16, 16) +
    avgRegionLum(W - 16, H - 16, 16, 16)
  ) / 4;
  var darkBg = bgLum < 128;

  // Grayscale + optional inversion
  for (var i = 0; i < data.length; i += 4) {
    var lum = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
    if (darkBg) lum = 255 - lum;
    data[i] = data[i + 1] = data[i + 2] = lum;
  }

  var work = document.createElement('canvas');
  work.width = W; work.height = H;
  work.getContext('2d').putImageData(d, 0, 0);

  // Upscale small images
  var maxDim = Math.max(W, H);
  if (maxDim < 1800) {
    var scale = Math.min(3, 1800 / maxDim);
    var up = document.createElement('canvas');
    up.width = Math.round(W * scale);
    up.height = Math.round(H * scale);
    var upCtx = up.getContext('2d');
    upCtx.imageSmoothingEnabled = true;
    upCtx.imageSmoothingQuality = 'high';
    upCtx.drawImage(work, 0, 0, up.width, up.height);
    return up;
  }
  return work;
}

function imageToCanvas(file) {
  return new Promise(function (resolve, reject) {
    var img = new Image();
    img.onload = function () {
      var c = document.createElement('canvas');
      c.width = img.naturalWidth;
      c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img, 0, 0);
      resolve(c);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

/* ───────── POST-PROCESSING ─────────
 * Clean up common Tesseract artifacts:
 *  - Drop short leading "junk" tokens (icon mis-reads).
 *  - Restore common file extensions where a small period got dropped.
 *  - Normalize l/I confusion before known suffixes.
 *  - Trim and collapse whitespace.
 */
function postProcess(text) {
  var lines = text.split('\n').map(function (l) { return l.replace(/\s+/g, ' ').trim(); });
  var out = [];
  var EXT_LIST = ['xlsx','docx','pptx','xls','doc','ppt','pdf','txt','csv','tsv','json','md','xml','html','png','jpg','jpeg','gif','mp3','mp4','wav','m4a','m4b','epub','zip','rar'];
  var commonShort = /^(I|A|An|At|To|Of|In|On|It|Is|As|Be|By|Do|Or|My|Up|Us|We|No|So|If|Go|He|She|The|And|For|Are|But|Not|You|All|Can|Has|Had|Was|Who|How|Why|Out|Now|See|Two|One|New|Way|Use|Get|Yes|Per|Any|Did)$/i;

  for (var li = 0; li < lines.length; li++) {
    var line = lines[li];
    if (!line) { out.push(''); continue; }

    // Strip leading 1-3 letter "junk" token followed by a much longer real word
    var m = line.match(/^([A-Za-z]{1,3})\s+(\S{4,}.*)$/);
    if (m && !commonShort.test(m[1])) {
      // If first token is 1-3 capital letters with no real-word feel, drop it
      // (avoids removing legit short words like "An", "The", "USA")
      if (m[1].length <= 2 && /[A-Z]/.test(m[1]) && !/^(US|UK|DC|CA|NY|TX|FL|UV|AI|ML|PR|CV|HR|HQ|VP|GM|TV|FM|AM|EU|UN)$/i.test(m[1])) {
        line = m[2];
      } else if (m[1].length === 3 && /^[A-Z]+$/.test(m[1]) && !/^(USA|FBI|CIA|DOJ|NYC|CEO|CFO|CTO|MBA|PhD|MFA|EMS|EMT)$/i.test(m[1])) {
        line = m[2];
      }
    }

    // Restore missing period before known extensions
    line = line.replace(new RegExp('([a-zA-Z0-9_])(' + EXT_LIST.join('|') + ')\\b', 'g'),
      function (full, prev, ext) { return prev + '.' + ext; });

    // Fix .xIsx / .xlsx variants → .xlsx (Tesseract often confuses I/l)
    line = line.replace(/\.x[Il1]sx\b/gi, '.xlsx');
    line = line.replace(/\.d[o0]cx?\b/gi, function (m) { return m.toLowerCase().replace(/0/g, 'o'); });
    // Collapse "filename .ext" → "filename.ext" (stray space before extension)
    line = line.replace(new RegExp('(\\S)\\s+\\.(' + EXT_LIST.join('|') + ')\\b', 'g'), '$1.$2');

    out.push(line);
  }

  // Collapse 3+ blank lines into 2
  var collapsed = [];
  var blanks = 0;
  for (var i = 0; i < out.length; i++) {
    if (out[i] === '') { blanks++; if (blanks <= 2) collapsed.push(''); }
    else { blanks = 0; collapsed.push(out[i]); }
  }
  return collapsed.join('\n').trim();
}

/* ───────── OCR RUN ─────────
 * Higher-accuracy 'best' Tesseract model. Run with PSM 6 (single uniform block)
 * AND PSM 4 (single column variable text), pick whichever has higher mean
 * word confidence with a small bonus for word count.
 */
async function runOCR() {
  if (!inputFile) return;
  document.getElementById('run-btn').disabled = true;
  document.getElementById('output').value = '';
  lastOutput = '';
  document.getElementById('progress-fill').style.width = '0%';

  var canvases;
  try {
    if (inputType === 'pdf') canvases = pdfPages;
    else canvases = [await imageToCanvas(inputFile)];
  } catch (e) {
    document.getElementById('status').textContent = 'Status: Error loading file - ' + e.message;
    document.getElementById('run-btn').disabled = false;
    return;
  }

  document.getElementById('status').textContent = 'Status: Loading high-accuracy OCR model (one-time, may take a moment)...';
  var worker;
  try {
    worker = await Tesseract.createWorker('eng', 1, {
      langPath: 'https://tessdata.projectnaptha.com/4.0.0_best',
      logger: function (m) {
        if (m.status === 'recognizing text' && typeof m.progress === 'number') {
          document.getElementById('progress-fill').style.width = Math.round(m.progress * 100) + '%';
        }
      }
    });
  } catch (e) {
    // Fall back to default fast model
    worker = await Tesseract.createWorker('eng', 1, {
      logger: function (m) {
        if (m.status === 'recognizing text' && typeof m.progress === 'number') {
          document.getElementById('progress-fill').style.width = Math.round(m.progress * 100) + '%';
        }
      }
    });
  }

  var allResults = [];
  for (var p = 0; p < canvases.length; p++) {
    document.getElementById('status').textContent = 'Status: Preprocessing page ' + (p + 1) + '/' + canvases.length + '...';
    var pre = preprocess(canvases[p]);

    var attempts = [];
    var PSMS = ['6', '4'];
    for (var ps = 0; ps < PSMS.length; ps++) {
      document.getElementById('status').textContent = 'Status: Recognizing page ' + (p + 1) + '/' + canvases.length + ' (pass ' + (ps + 1) + '/' + PSMS.length + ')...';
      document.getElementById('progress-fill').style.width = '0%';
      await worker.setParameters({ tessedit_pageseg_mode: PSMS[ps], preserve_interword_spaces: '1' });
      var res = await worker.recognize(pre);
      var words = (res.data && res.data.words) || [];
      var meanConf = 0;
      if (words.length) {
        var sum = 0;
        for (var w = 0; w < words.length; w++) sum += words[w].confidence;
        meanConf = sum / words.length;
      }
      attempts.push({ text: (res.data.text || '').trim(), conf: meanConf, words: words.length });
    }
    attempts.sort(function (a, b) { return (b.conf + b.words * 0.05) - (a.conf + a.words * 0.05); });
    allResults.push(attempts[0]);

    var partial = allResults.map(function (r, i) {
      return canvases.length > 1 ? '\n=== Page ' + (i + 1) + ' ===\n\n' + postProcess(r.text) : postProcess(r.text);
    }).join('\n').trim();
    document.getElementById('output').value = partial;
  }
  await worker.terminate();

  lastOutput = allResults.map(function (r, i) {
    return canvases.length > 1 ? '\n=== Page ' + (i + 1) + ' ===\n\n' + postProcess(r.text) : postProcess(r.text);
  }).join('\n').trim();
  document.getElementById('output').value = lastOutput;
  document.getElementById('progress-fill').style.width = '100%';

  var meanConf = 0;
  for (var i = 0; i < allResults.length; i++) meanConf += allResults[i].conf;
  meanConf = allResults.length > 0 ? Math.round(meanConf / allResults.length) : 0;
  var wordCount = lastOutput.split(/\s+/).filter(function (w) { return w.length > 0; }).length;

  document.getElementById('status').textContent = 'Status: Done — ' + wordCount + ' words, ' + meanConf + '% confidence';
  document.getElementById('copy-btn').disabled = false;
  document.getElementById('dl-btn').disabled = false;
  document.getElementById('clear-btn').disabled = false;
  document.getElementById('run-btn').disabled = false;
}

function copyText() {
  navigator.clipboard.writeText(lastOutput);
  document.getElementById('status').textContent = 'Status: Copied to clipboard';
}
function downloadTxt() {
  var name = inputFile ? inputFile.name.replace(/\.[^.]+$/, '') : 'ocr-output';
  var blob = new Blob([lastOutput], { type: 'text/plain' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name + '.txt';
  a.click();
}
function clearAll() {
  inputFile = null; inputType = null; pdfPages = []; lastOutput = '';
  document.getElementById('output').value = '';
  document.getElementById('preview-area').innerHTML = '';
  document.getElementById('file-info').textContent = 'No file selected';
  document.getElementById('upload-btn').textContent = 'Upload Image or PDF';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('run-btn').disabled = true;
  document.getElementById('copy-btn').disabled = true;
  document.getElementById('dl-btn').disabled = true;
  document.getElementById('clear-btn').disabled = true;
  document.getElementById('status').textContent = 'Status: Ready';
}
</script>
